    <text x="136" y="218" font-family="Georgia, serif" font-size="46" font-weight="800" fill="#181824">The Form</text>
    <rect x="1040" y="126" width="390" height="88" rx="44" fill="#fffdf8"/>
    <circle cx="1082" cy="170" r="14" fill="#a9683f"/>
    <text x="1114" y="180" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#181824">Bamiyan absence</text>
    <rect x="974" y="674" width="250" height="78" rx="39" fill="#fffdf8"/>
