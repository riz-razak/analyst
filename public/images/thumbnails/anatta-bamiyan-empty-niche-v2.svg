    <text x="500" y="648" font-family="Georgia, serif" font-size="76" font-weight="800" fill="#181824">Was Empty</text>
    <text x="500" y="700" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="850" fill="#a9683f">Anatta, Bamiyan and non-self</text>
