<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Caravan Fresh consumer warning thumbnail</title>
  <desc id="desc">A darker consumer-rights thumbnail showing complaint records, food safety cards, and corporate-pressure routes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#151814"/>
  <circle cx="1252" cy="248" r="272" fill="#c9a96e" opacity="0.22"/>
  <circle cx="1130" cy="654" r="254" fill="#315f48" opacity="0.22"/>
  <g opacity="0.22" stroke="#fff8eb" stroke-width="1">
    <path d="M0 160H1600M0 330H1600M0 500H1600M0 670H1600"/>
    <path d="M220 0V900M480 0V900M740 0V900M1000 0V900M1260 0V900"/>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(810 104) rotate(3)">
      <rect width="424" height="114" rx="14" fill="#fbf8ef" stroke="#dacdb9" stroke-width="3"/>
      <text x="28" y="50" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#181824">Complaint route</text>
      <rect x="28" y="74" width="292" height="10" rx="5" fill="#315f48"/>
      <circle cx="362" cy="58" r="18" fill="#315f48"/>
    </g>
    <g transform="translate(942 302) rotate(-2)">
      <rect width="424" height="114" rx="14" fill="#fbf8ef" stroke="#dacdb9" stroke-width="3"/>
      <text x="28" y="50" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#181824">Food safety</text>
      <rect x="28" y="74" width="276" height="10" rx="5" fill="#c9a96e"/>
      <circle cx="360" cy="58" r="18" fill="#c9a96e"/>
    </g>
    <g transform="translate(836 522) rotate(2)">
      <rect width="500" height="116" rx="14" fill="#fbf8ef" stroke="#dacdb9" stroke-width="3"/>
      <text x="28" y="50" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#181824">Corporate pressure</text>
      <rect x="28" y="74" width="354" height="10" rx="5" fill="#c65f4a"/>
      <circle cx="430" cy="58" r="18" fill="#c65f4a"/>
    </g>
  </g>

  <g fill="#0f110f">
    <rect x="100" y="610" width="460" height="92" rx="18"/>
    <circle cx="160" cy="656" r="30" fill="#2d342d"/>
    <rect x="210" y="636" width="210" height="16" rx="8" fill="#2d342d"/>
    <rect x="210" y="668" width="280" height="16" rx="8" fill="#2d342d"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M304 654 C478 528 608 228 1174 162" stroke="#315f48" stroke-width="8"/>
    <path d="M430 700 C642 638 756 396 1300 358" stroke="#c9a96e" stroke-width="8"/>
    <path d="M558 724 C728 702 828 610 1270 584" stroke="#c65f4a" stroke-width="8"/>
    <path d="M1238 162 C1020 256 828 310 558 724" stroke="#315f48" stroke-width="5" stroke-dasharray="18 18" opacity="0.66"/>
    <path d="M1308 358 C1060 428 810 506 430 700" stroke="#c9a96e" stroke-width="5" stroke-dasharray="16 20" opacity="0.66"/>
  </g>
  <g fill="#315f48"><circle cx="304" cy="654" r="16"/><circle cx="1174" cy="162" r="16"/></g>
  <g fill="#c9a96e"><circle cx="430" cy="700" r="16"/><circle cx="1300" cy="358" r="16"/></g>
  <g fill="#c65f4a"><circle cx="558" cy="724" r="16"/><circle cx="1270" cy="584" r="16"/></g>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <text x="122" y="152" font-size="30" font-weight="850" letter-spacing="4" fill="#c9a96e">THE ANALYST DOSSIER</text>
    <text x="122" y="270" font-size="82" font-weight="900" fill="#fffdf7">Caravan Fresh</text>
    <text x="122" y="350" font-size="64" font-weight="900" fill="#fffdf7">Chicken Cheese Bomb</text>
    <text x="122" y="414" font-size="35" font-weight="850" fill="#e3cf9a">Consumer rights under pressure</text>
    <rect x="122" y="458" width="444" height="68" rx="34" fill="#fbf8ef" opacity="0.94"/>
    <text x="154" y="502" font-size="24" font-weight="850" fill="#315f48">complaint route + food safety</text>
