<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Caravan Fresh consumer counter thumbnail</title>
  <desc id="desc">A restrained consumer-rights thumbnail with a kitchen counter, receipt trail, product box silhouette, and complaint checklist.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#31271b" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="counter" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f1e3"/>
      <stop offset="1" stop-color="#e8dcc5"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="#f4efe3"/>
  <rect x="0" y="560" width="1600" height="340" fill="url(#counter)"/>
  <path d="M0 560 H1600" stroke="#d8cbb8" stroke-width="4"/>
  <g opacity="0.2" stroke="#cbbfae">
    <path d="M0 650H1600M0 760H1600"/>
    <path d="M220 560V900M520 560V900M820 560V900M1120 560V900M1420 560V900"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="110" y="112" width="470" height="610" rx="22" fill="#fffdf8" stroke="#ded3c2" stroke-width="4"/>
    <text x="158" y="174" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" letter-spacing="4" fill="#315f48">CONSUMER RECORD</text>
    <text x="158" y="248" font-family="Georgia, serif" font-size="46" font-weight="800" fill="#181824">Complaint</text>
    <text x="158" y="302" font-family="Georgia, serif" font-size="46" font-weight="800" fill="#181824">Route</text>
    <g font-family="Inter, Arial, sans-serif" font-size="26" font-weight="750" fill="#3f403a">
      <circle cx="164" cy="386" r="12" fill="#315f48"/><text x="198" y="395">receipt kept</text>
      <circle cx="164" cy="456" r="12" fill="#c9a96e"/><text x="198" y="465">complaint filed</text>
      <circle cx="164" cy="526" r="12" fill="#c65f4a"/><text x="198" y="535">pressure checked</text>
    </g>
    <rect x="158" y="594" width="310" height="18" rx="9" fill="#ded3c2"/>
    <rect x="158" y="636" width="366" height="18" rx="9" fill="#ded3c2"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="948" y="180" width="438" height="420" rx="28" fill="#fefaf0" stroke="#d8cbb8" stroke-width="4"/>
    <rect x="1008" y="250" width="318" height="210" rx="22" fill="#315f48" opacity="0.12"/>
    <path d="M1038 462 L1296 462 L1270 532 L1064 532 Z" fill="#a9683f" opacity="0.24"/>
    <text x="1014" y="324" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#315f48">food safety</text>
    <text x="1014" y="374" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#a9683f">public record</text>
  </g>
  <g fill="none" stroke-linecap="round">
    <path d="M582 414 C710 376 818 360 948 346" stroke="#315f48" stroke-width="8"/>
    <path d="M582 482 C724 506 820 512 948 484" stroke="#c9a96e" stroke-width="8"/>
    <path d="M582 552 C710 636 830 676 1064 594" stroke="#c65f4a" stroke-width="7" stroke-dasharray="18 20"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="206" width="520" height="210" rx="28" fill="#fffdf8" stroke="#ded3c2" stroke-width="3"/>
    <text x="564" y="276" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" letter-spacing="4" fill="#315f48">THE ANALYST DOSSIER</text>
    <text x="564" y="352" font-family="Georgia, serif" font-size="58" font-weight="800" fill="#181824">Caravan Fresh</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="448" width="590" height="170" rx="28" fill="#151814"/>
    <text x="564" y="520" font-family="Georgia, serif" font-size="50" font-weight="800" fill="#fffdf7">Chicken Cheese Bomb</text>
    <text x="564" y="570" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#e3cf9a">A consumer advocacy case study</text>
  </g>
</svg>
