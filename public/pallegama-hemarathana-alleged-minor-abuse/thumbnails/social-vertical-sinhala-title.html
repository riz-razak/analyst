<!doctype html>
<html lang="si">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pallegama Sinhala Vertical Thumbnail</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1920px;
      margin: 0;
      overflow: hidden;
      background: #090d0a;
    }
    body {
      position: relative;
      color: #fff7e7;
      font-family: "Noto Sans Sinhala", "Sinhala Sangam MN", "Sinhala MN", "Iskoola Pota", "Malithi Web", Inter, ui-sans-serif, system-ui, sans-serif;
      isolation: isolate;
    }
    .photo {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 740px;
      z-index: -4;
      background-image: url("../assets/pallegama-hemarathana-context.webp");
      background-size: 1080px auto;
      background-position: center top;
      background-repeat: no-repeat;
      filter: saturate(.92) contrast(1.05) brightness(.78);
    }
    .veil {
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(180deg, rgba(5, 8, 6, .22) 0%, rgba(7, 10, 8, .2) 28%, rgba(8, 12, 9, .9) 42%, rgba(8, 12, 9, .94) 100%),
        radial-gradient(circle at 50% 18%, rgba(212, 138, 44, .16), transparent 28%),
        radial-gradient(circle at 14% 70%, rgba(212, 138, 44, .18), transparent 24%);
    }
    .edge {
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(3, 6, 4, .7), transparent 18%, transparent 82%, rgba(3, 6, 4, .7)),
        linear-gradient(0deg, rgba(3, 6, 4, .88), transparent 22%, transparent 68%, rgba(3, 6, 4, .28));
    }
    h1 {
      position: absolute;
      left: 70px;
      right: 66px;
      top: 760px;
      margin: 0;
      font-size: 108px;
      line-height: 1.12;
      font-weight: 950;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow:
        0 18px 44px rgba(0, 0, 0, .72),
        0 2px 0 rgba(0, 0, 0, .38);
    }
    .source-stack {
      position: absolute;
      left: 70px;
      right: 70px;
      bottom: 104px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .card {
      min-height: 132px;
      padding: 24px 28px;
      border-radius: 20px;
      border: 1px solid rgba(255, 247, 231, .22);
      background: rgba(12, 16, 12, .82);
      color: #fff7e7;
      box-shadow: 0 22px 54px rgba(0, 0, 0, .34);
    }
    .card b {
      display: block;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 42px;
      line-height: 1.05;
      font-weight: 920;
    }
    .card span {
      display: block;
      margin-top: 8px;
      color: #dcc9a6;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 30px;
      line-height: 1.1;
      font-weight: 820;
    }
    .card:nth-child(1) { transform: rotate(1.4deg); }
    .card:nth-child(2) { transform: rotate(-1.2deg); }
    .card:nth-child(3) { transform: rotate(.9deg); }
    .card:nth-child(4) { transform: rotate(-1deg); }
  </style>
</head>
<body>
  <div class="photo" aria-hidden="true"></div>
  <div class="veil" aria-hidden="true"></div>
  <div class="edge" aria-hidden="true"></div>
  <h1>පල්ලෙගම 🍇 ජනතාව vs බලය</h1>
  <div class="source-stack" aria-hidden="true">
    <div class="card"><b>March complaint</b><span>disappearance record</span></div>
    <div class="card"><b>April 24 letter</b><span>NCPA action question</span></div>
    <div class="card"><b>B reports</b><span>court process trail</span></div>
    <div class="card"><b>Right of reply</b><span>publication gate</span></div>
  </div>
</body>
</html>
