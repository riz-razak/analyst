<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect (BrowserRouter / path-based)
    // Encodes the requested path into ?p= so index.html can restore it via history.replaceState.
    // See: https://github.com/rafgraph/spa-github-pages
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/' +
      '?p=' + encodeURIComponent(l.pathname + l.search) +
      (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
