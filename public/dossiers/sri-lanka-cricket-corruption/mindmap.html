          const other = l.source === n ? l.target : l.source;
          if (!visibleTypes.has(other.type) || !visibleTypes.has(n.type)) return;
          const dx   = other.x - n.x;
          const dy   = other.y - n.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          // strength 5 → ideal 130px  |  strength 1 → ideal 330px

          const force = (dist - ideal) * 0.004 * alpha;
          fx += (dx / dist) * force;
          fy += (dy / dist) * force;
        });

        // Node repulsion — inverse-square, charge scales with node size
        nodes.forEach(other => {
          if (other === n) return;
          if (other.expanded && !showExpanded) return;
          if (!visibleTypes.has(other.type) || !visibleTypes.has(n.type)) return;
          const dx     = n.x - other.x;
          const dy     = n.y - other.y;
          const distSq = dx * dx + dy * dy || 1;
          const dist   = Math.sqrt(distSq);
          if (dist < 380) {
            const charge = (n.size + other.size) * 180;
            const force  = Math.min(charge / distSq, 6) * alpha;
            fx += (dx / dist) * force;
            fy += (dy / dist) * force;

        n.vy = (n.vy + fy) * 0.82;

        n.y += n.vy;

          panY = oldPanY + (moveE.clientY - panDragStartY);

        const endPan = () => {

      scale = Math.max(0.1, Math.min(3, scale));

      // Zoom toward mouse
      const mouseX = (e.clientX - panX) / oldScale;
      const mouseY = (e.clientY - panY) / oldScale;
      panX -= mouseX * (scale - oldScale);
      panY -= mouseY * (scale - oldScale);

    function toggleLang() {
      currentLang = currentLang === 'en' ? 'si' : 'en';
      localStorage.setItem('slc-lang', currentLang);
      applyLang();
    }

    function applyLang() {
      const btn = document.getElementById('lang-toggle');
      if (currentLang === 'si') {
        btn.textContent = 'EN';
        btn.classList.add('si-active');
      } else {
        btn.textContent = 'සිං';
        btn.classList.remove('si-active');
      }
      // data-en/data-si spans (tour labels, hint, etc.)
      document.querySelectorAll('[data-en]').forEach(el => {
        el.textContent = currentLang === 'si' ? (el.dataset.si || el.dataset.en) : el.dataset.en;
      });
    }

    // Apply on load
    applyLang();

    // ============ PRODUCT TOUR ============
    let tourDismissed = false;
    function showTour() {
      document.querySelectorAll('.tour-label').forEach(el => el.classList.add('visible'));
      setTimeout(() => { if (!tourDismissed) dismissTour(); }, 6000);
    }
    function dismissTour() {
      if (tourDismissed) return;
      tourDismissed = true;
      document.querySelectorAll('.tour-label').forEach(el => {
        el.style.opacity = '0';
        setTimeout(() => el.style.display = 'none', 500);
      });
    }
    setTimeout(showTour, 1500);
    svg.addEventListener('mousedown', dismissTour, { once: true });
    svg.addEventListener('wheel', dismissTour, { once: true });
    svg.addEventListener('touchstart', dismissTour, { once: true });

  </script>
