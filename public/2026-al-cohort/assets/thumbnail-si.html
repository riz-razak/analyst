<!doctype html><meta charset="utf-8">
<title>A/L thumbnail — Sinhala (1200×630, screenshot to PNG)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;800&family=Noto+Serif:wght@800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  /* Server-side Sinhala rasterisation is unavailable (no Sinhala font + no
     network in the build env), so this thumbnail is a pixel-exact 1200×630
     HTML card. Open in a browser and screenshot the .card to PNG, save as
     assets/thumbnail-si.png, then point the registry thumbnailUrl at it. */
  :root{ --paper:#FAFAF8; --ink:#1A1A2E; --forest:#2D6A4F; --gold:#C4A35A; --muted:#5C5C6B; --line:#E5E1DA; }
  html,body{margin:0;background:#3a3a3a;display:grid;place-items:center;min-height:100vh}
  .card{width:1200px;height:630px;background:var(--paper);position:relative;overflow:hidden;box-sizing:border-box;padding:0}
  .rule{position:absolute;top:0;left:0;right:0;height:10px;background:var(--forest)}
  .pad{padding:64px 72px 0}
  .kicker{font:800 20px/1 'DM Mono',monospace;letter-spacing:.06em;color:var(--forest);text-transform:uppercase}
  h1{font:800 72px/1.18 'Noto Sans Sinhala',sans-serif;color:var(--ink);margin:22px 0 0;max-width:1000px}
  .u{display:inline-block;border-bottom:8px solid var(--gold);padding-bottom:2px}
  .dek{font:400 27px/1.85 'Noto Sans Sinhala',sans-serif;color:var(--muted);margin:26px 0 0;max-width:1000px}
  .foot{position:absolute;left:72px;right:72px;bottom:44px;display:flex;justify-content:space-between;
        align-items:center;border-top:1px solid var(--line);padding-top:16px}
  .brand{font:800 20px/1 'DM Mono',monospace;letter-spacing:.06em;color:var(--forest);text-transform:uppercase}
  .url{font:400 20px/1 'DM Mono',monospace;color:var(--muted)}
</style>
<div class="card">
  <div class="rule"></div>
  <div class="pad">
    <div class="kicker">අධ්‍යාපනය · ප්‍රතිපත්ති සහ නීතිය</div>
    <h1>අන්තිමට A/L බිල<br><span class="u">ගෙවන්නෙ ළමයින්ද?</span></h1>
    <div class="dek">2020 සිට කැඩුණු විභාග දින දර්ශනය 2026 දී එකවර හදන්න ගිහින්, ඒකෙ පිරිවැය එක් සිසු පිරිසකට පැටවුවා.</div>
  </div>
  <div class="foot"><span class="brand">The Analyst</span><span class="url">analyst.rizrazak.com</span></div>
</div>
