<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riz Razak — Landing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    background: #e8f0e8;
    min-height: 100vh;
    cursor: default;
  }

  /* ══════════════════════════════════════
     SKY
  ══════════════════════════════════════ */
  .sky {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: linear-gradient(180deg,
      #b8d4e8 0%,
      #d4e4ef 25%,
      #e8eff5 45%,
      #f0efe8 65%,
      #e8f0e8 80%
    );
    z-index: 0;
  }

  /* Clouds */
  .cloud {
    position: fixed;
    opacity: 0.5;
    z-index: 1;
  }
  .cloud svg { width: 100%; height: 100%; }
  .cloud-1 { top: 6%; left: -10%; width: 280px; animation: drift-cloud 80s linear infinite; }
  .cloud-2 { top: 12%; left: 30%; width: 200px; animation: drift-cloud 100s linear infinite; animation-delay: -30s; opacity: 0.35; }
  .cloud-3 { top: 3%; left: 60%; width: 240px; animation: drift-cloud 90s linear infinite; animation-delay: -55s; opacity: 0.4; }
  .cloud-4 { top: 18%; left: 10%; width: 160px; animation: drift-cloud 110s linear infinite; animation-delay: -70s; opacity: 0.3; }

  @keyframes drift-cloud {
    from { transform: translateX(-300px); }
    to   { transform: translateX(calc(100vw + 300px)); }
  }

  /* ══════════════════════════════════════
     LANDSCAPE — Rolling meadow hills
  ══════════════════════════════════════ */
  .landscape {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 55vh;
    z-index: 2;
  }

  /* Far hills */
  .hills-far {
    position: absolute; bottom: 15vh; left: -5%; width: 110%;
    height: 25vh;
    background:
      radial-gradient(ellipse 50% 100% at 20% 100%, #9ab89a 0%, transparent 70%),
      radial-gradient(ellipse 40% 100% at 55% 100%, #8aad8a 0%, transparent 70%),
      radial-gradient(ellipse 45% 100% at 85% 100%, #92b592 0%, transparent 70%);
    opacity: 0.6;
  }

  /* Mid hills */
  .hills-mid {
    position: absolute; bottom: 5vh; left: -5%; width: 110%;
    height: 22vh;
    background:
      radial-gradient(ellipse 55% 100% at 15% 100%, #7aaa6a 0%, transparent 65%),
      radial-gradient(ellipse 50% 100% at 50% 100%, #6d9e5d 0%, transparent 65%),
      radial-gradient(ellipse 45% 100% at 80% 100%, #74a564 0%, transparent 65%);
    opacity: 0.75;
  }

  /* Near ground */
  .ground {
    position: absolute; bottom: 0; left: -5%; width: 110%;
    height: 18vh;
    background: linear-gradient(180deg, #5a9a45 0%, #4a8a38 40%, #3d7a2d 100%);
    border-radius: 50% 50% 0 0 / 20% 20% 0 0;
  }

  /* Grass tufts */
  .grass-layer {
    position: absolute; bottom: 16vh; left: 0; width: 100%; height: 6vh;
    z-index: 3;
  }

  .grass-tuft {
    position: absolute;
    bottom: 0;
  }

  /* Tiny wildflowers scattered in the grass */
  .wildflower {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    z-index: 3;
  }
  .wf-1 { bottom: 17vh; left: 12%; background: #e8a0b0; animation: sway-flower 3s ease-in-out infinite; }
  .wf-2 { bottom: 18vh; left: 28%; background: #f0c878; animation: sway-flower 3.5s ease-in-out infinite 0.5s; }
  .wf-3 { bottom: 16.5vh; left: 45%; background: #e8a0b0; animation: sway-flower 2.8s ease-in-out infinite 1s; width:5px;height:5px; }
  .wf-4 { bottom: 19vh; left: 62%; background: #c8a0e0; animation: sway-flower 3.2s ease-in-out infinite 0.3s; }
  .wf-5 { bottom: 17.5vh; left: 78%; background: #f0c878; animation: sway-flower 3s ease-in-out infinite 1.5s; width:7px;height:7px; }
  .wf-6 { bottom: 18.5vh; left: 90%; background: #e8a0b0; animation: sway-flower 3.4s ease-in-out infinite 0.8s; }

  @keyframes sway-flower {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(2px, -1px) rotate(5deg); }
  }

  /* ══════════════════════════════════════
     CHARACTERS
  ══════════════════════════════════════ */

  /* --- Forest Spirit (Kodama × Sri Lankan) --- */
  .forest-spirit {
    position: fixed;
    z-index: 10;
  }

  /* Spirit 1: sits on left hill, bobs happily */
  .spirit-sit-left {
    bottom: 22vh; left: 14%;
    animation: spirit-bob 3s ease-in-out infinite;
  }

  /* Spirit 2: sits on right hill */
  .spirit-sit-right {
    bottom: 24vh; right: 18%;
    animation: spirit-bob 3.5s ease-in-out infinite 0.8s;
  }

  /* Spirit 3: small one following the scurrying yaka */
  .spirit-follow {
    bottom: 6vh; left: -40px;
    animation: scurry-across 18s ease-in-out infinite 2s;
  }

  @keyframes spirit-bob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    30% { transform: translateY(-8px) rotate(2deg); }
    60% { transform: translateY(-3px) rotate(-1deg); }
  }

  /* --- Elephant Spirit --- */
  .elephant-spirit {
    position: fixed;
    bottom: 19vh; left: 38%;
    z-index: 9;
    animation: elephant-walk 20s ease-in-out infinite;
  }

  @keyframes elephant-walk {
    0% { transform: translateX(0); }
    25% { transform: translateX(30px); }
    50% { transform: translateX(60px); }
    75% { transform: translateX(30px); }
    100% { transform: translateX(0); }
  }

  .elephant-body { animation: elephant-step 1.5s ease-in-out infinite; }
  @keyframes elephant-step {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  .trunk { animation: trunk-swing 2.5s ease-in-out infinite; transform-origin: top center; }
  @keyframes trunk-swing {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(8deg); }
  }

  .elephant-tail { animation: tail-wag 1.8s ease-in-out infinite; transform-origin: top center; }
  @keyframes tail-wag {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(10deg); }
  }

  /* --- Peacock Spirit --- */
  .peacock-spirit {
    position: fixed;
    bottom: 21vh; right: 28%;
    z-index: 9;
  }

  .peacock-fan {
    animation: fan-breathe 4s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes fan-breathe {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    50% { transform: scaleX(1.15) scaleY(1.08); }
  }

  .peacock-head { animation: peacock-look 5s ease-in-out infinite; transform-origin: bottom center; }
  @keyframes peacock-look {
    0%, 100% { transform: rotate(0deg); }
    30% { transform: rotate(8deg); }
    70% { transform: rotate(-5deg); }
  }

  /* --- Leopard Spirit --- */
  .leopard-spirit {
    position: fixed;
    bottom: 17vh; right: 10%;
    z-index: 8;
    animation: leopard-slink 16s ease-in-out infinite;
  }

  @keyframes leopard-slink {
    0%, 100% { transform: translateX(0) scaleX(1); }
    20% { transform: translateX(-40px) scaleX(1); }
    45% { transform: translateX(-80px) scaleX(1); }
    50% { transform: translateX(-80px) scaleX(-1); }
    75% { transform: translateX(-30px) scaleX(-1); }
    95% { transform: translateX(0) scaleX(-1); }
    100% { transform: translateX(0) scaleX(1); }
  }

  .leopard-tail-anim { animation: cat-tail 2s ease-in-out infinite; transform-origin: left center; }
  @keyframes cat-tail {
    0%, 100% { transform: rotate(-10deg); }
    50% { transform: rotate(15deg); }
  }

  .leopard-body-bounce { animation: cat-step 0.8s ease-in-out infinite; }
  @keyframes cat-step {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-1.5px); }
  }

  /* --- Baby Yaka --- */

  /* Yaka 1: Peeks from behind left hill */
  .yaka-peek-left {
    position: fixed;
    bottom: 25vh; left: 0;
    z-index: 11;
    animation: yaka-peek-l 8s ease-in-out infinite;
  }
  @keyframes yaka-peek-l {
    0%, 100% { transform: translateX(-35px) rotate(0deg); }
    15% { transform: translateX(0px) rotate(-5deg); }
    25% { transform: translateX(5px) rotate(3deg); }
    35% { transform: translateX(5px) rotate(-8deg); }
    45% { transform: translateX(0px) rotate(0deg); }
    55% { transform: translateX(-35px) rotate(0deg); }
  }

  /* Yaka 2: Peeks from right */
  .yaka-peek-right {
    position: fixed;
    bottom: 28vh; right: 0;
    z-index: 11;
    animation: yaka-peek-r 10s ease-in-out infinite 3s;
  }
  @keyframes yaka-peek-r {
    0%, 100% { transform: translateX(35px) rotate(0deg); }
    15% { transform: translateX(0px) rotate(5deg); }
    25% { transform: translateX(-5px) rotate(-3deg); }
    35% { transform: translateX(-5px) rotate(8deg); }
    50% { transform: translateX(0px) rotate(0deg); }
    60% { transform: translateX(35px) rotate(0deg); }
  }

  /* Yaka 3: Scurries across the meadow */
  .yaka-scurry {
    position: fixed;
    bottom: 10vh; left: -60px;
    z-index: 12;
    animation: scurry-across 14s ease-in-out infinite 5s;
  }

  @keyframes scurry-across {
    0%   { left: -60px;  bottom: 10vh; }
    5%   { left: 5%;     bottom: 11vh; }
    15%  { left: 15%;    bottom: 9vh; }
    20%  { left: 22%;    bottom: 12vh; }  /* jumps up */
    25%  { left: 28%;    bottom: 9vh; }
    35%  { left: 40%;    bottom: 10vh; }
    40%  { left: 45%;    bottom: 10vh; }  /* pause — looks around */
    45%  { left: 45%;    bottom: 10vh; }
    55%  { left: 58%;    bottom: 11vh; }
    65%  { left: 72%;    bottom: 9vh; }
    70%  { left: 78%;    bottom: 13vh; }  /* another jump */
    75%  { left: 82%;    bottom: 10vh; }
    85%  { left: 92%;    bottom: 10vh; }
    95%  { left: calc(100% + 20px); bottom: 10vh; }
    100% { left: calc(100% + 60px); bottom: 10vh; }
  }

  .yaka-run-bounce {
    animation: yaka-bounce 0.35s ease-in-out infinite;
  }
  @keyframes yaka-bounce {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
  }

  .yaka-hair-fly {
    animation: hair-wild 0.4s ease-in-out infinite;
  }
  @keyframes hair-wild {
    0%, 100% { transform: rotate(-5deg) translateX(2px); }
    50% { transform: rotate(5deg) translateX(-2px); }
  }

  .yaka-arms-run {
    animation: arms-pump 0.35s ease-in-out infinite;
  }
  @keyframes arms-pump {
    0%, 100% { transform: rotate(-15deg); }
    50% { transform: rotate(15deg); }
  }

  /* Yaka peeking eyes blink */
  .yaka-blink {
    animation: blink-eyes 4s ease-in-out infinite;
  }
  @keyframes blink-eyes {
    0%, 45%, 55%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.1); }
  }

  /* --- Butterfly --- */
  .butterfly {
    position: fixed;
    z-index: 15;
    animation: flutter-path 12s ease-in-out infinite;
  }
  .butterfly-1 {
    top: 30%; left: 20%;
    animation: flutter-1 16s ease-in-out infinite;
  }
  .butterfly-2 {
    top: 45%; right: 25%;
    animation: flutter-2 20s ease-in-out infinite 4s;
  }

  @keyframes flutter-1 {
    0%   { transform: translate(0, 0) rotate(0deg); }
    15%  { transform: translate(60px, -40px) rotate(10deg); }
    30%  { transform: translate(120px, -20px) rotate(-5deg); }
    50%  { transform: translate(80px, -70px) rotate(8deg); }
    70%  { transform: translate(30px, -30px) rotate(-10deg); }
    85%  { transform: translate(-20px, -10px) rotate(5deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }
  @keyframes flutter-2 {
    0%   { transform: translate(0, 0) rotate(0deg); }
    20%  { transform: translate(-50px, -30px) rotate(-8deg); }
    40%  { transform: translate(-90px, 10px) rotate(6deg); }
    60%  { transform: translate(-40px, -50px) rotate(-4deg); }
    80%  { transform: translate(10px, -20px) rotate(8deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

  .wing-flap {
    animation: flap 0.3s ease-in-out infinite;
  }
  @keyframes flap {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(0.3); }
  }

  /* ══════════════════════════════════════
     CONTENT CARD
  ══════════════════════════════════════ */
  .content-layer {
    position: relative;
    z-index: 20;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    pointer-events: none;
  }

  .card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 440px;
    width: 100%;
    pointer-events: auto;
    box-shadow:
      0 8px 32px rgba(60, 100, 40, 0.12),
      0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid rgba(255,255,255,0.6);
    animation: card-in 1s ease-out 0.3s both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .label {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8a9a7a;
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: #2a3a20;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .tagline {
    font-size: 0.95rem;
    color: #6a7a5a;
    font-weight: 300;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  .cta {
    display: inline-block;
    font-size: 0.85rem;
    color: #4a7a3a;
    text-decoration: none;
    padding: 0.7rem 1.6rem;
    border-radius: 50px;
    border: 1.5px solid rgba(74, 122, 58, 0.3);
    background: rgba(74, 122, 58, 0.06);
    transition: all 0.3s ease;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .cta:hover {
    background: rgba(74, 122, 58, 0.12);
    border-color: rgba(74, 122, 58, 0.5);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(74, 122, 58, 0.15);
  }

  /* ══════════════════════════════════════
     PARALLAX
  ══════════════════════════════════════ */
  .parallax-layer { transition: transform 0.15s ease-out; }

</style>
</head>
<body>

<!-- SKY -->
<div class="sky parallax-layer" data-speed="0.01"></div>

<!-- CLOUDS -->
<div class="cloud cloud-1 parallax-layer" data-speed="0.02">
  <svg viewBox="0 0 280 80" fill="none"><ellipse cx="140" cy="50" rx="130" ry="30" fill="white" opacity="0.8"/><ellipse cx="100" cy="40" rx="80" ry="35" fill="white" opacity="0.9"/><ellipse cx="180" cy="42" rx="70" ry="28" fill="white" opacity="0.85"/></svg>
</div>
<div class="cloud cloud-2 parallax-layer" data-speed="0.015">
  <svg viewBox="0 0 200 60" fill="none"><ellipse cx="100" cy="35" rx="90" ry="22" fill="white" opacity="0.85"/><ellipse cx="70" cy="28" rx="60" ry="25" fill="white" opacity="0.9"/><ellipse cx="140" cy="30" rx="50" ry="20" fill="white"/></svg>
</div>
<div class="cloud cloud-3 parallax-layer" data-speed="0.025">
  <svg viewBox="0 0 240 70" fill="none"><ellipse cx="120" cy="40" rx="110" ry="28" fill="white" opacity="0.8"/><ellipse cx="80" cy="35" rx="70" ry="30" fill="white" opacity="0.9"/><ellipse cx="170" cy="36" rx="60" ry="24" fill="white"/></svg>
</div>
<div class="cloud cloud-4 parallax-layer" data-speed="0.018">
  <svg viewBox="0 0 160 50" fill="none"><ellipse cx="80" cy="30" rx="70" ry="20" fill="white" opacity="0.85"/><ellipse cx="55" cy="25" rx="50" ry="22" fill="white" opacity="0.9"/></svg>
</div>

<!-- LANDSCAPE -->
<div class="landscape parallax-layer" data-speed="0.03">
  <div class="hills-far"></div>
  <div class="hills-mid"></div>
  <div class="ground"></div>
</div>

<!-- Wildflowers -->
<div class="wildflower wf-1"></div>
<div class="wildflower wf-2"></div>
<div class="wildflower wf-3"></div>
<div class="wildflower wf-4"></div>
<div class="wildflower wf-5"></div>
<div class="wildflower wf-6"></div>

<!-- ══════════════════════════════════════
     CHARACTERS
══════════════════════════════════════ -->

<!-- FOREST SPIRIT 1 — sitting on left hill, bobbing -->
<div class="forest-spirit spirit-sit-left parallax-layer" data-speed="0.035">
  <svg width="36" height="44" viewBox="0 0 36 44" fill="none">
    <!-- body blob -->
    <ellipse cx="18" cy="30" rx="14" ry="14" fill="#e8f0d8" stroke="#b8d0a0" stroke-width="1"/>
    <!-- kolam dot forehead -->
    <circle cx="18" cy="22" r="2" fill="#d4956a"/>
    <!-- eyes — big and happy -->
    <circle cx="13" cy="27" r="2.5" fill="#2a3a20"/>
    <circle cx="23" cy="27" r="2.5" fill="#2a3a20"/>
    <circle cx="14" cy="26.5" r="1" fill="white"/>
    <circle cx="24" cy="26.5" r="1" fill="white"/>
    <!-- little smile -->
    <path d="M14 32 Q18 36 22 32" stroke="#2a3a20" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- leaf ear left -->
    <path d="M6 20 Q4 12 10 16" fill="#8ab870" stroke="#6a9a50" stroke-width="0.5"/>
    <!-- leaf ear right -->
    <path d="M30 20 Q32 12 26 16" fill="#8ab870" stroke="#6a9a50" stroke-width="0.5"/>
    <!-- sprout on top -->
    <path d="M18 16 Q18 8 22 6" stroke="#6a9a50" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <ellipse cx="23" cy="6" rx="4" ry="2.5" fill="#8ab870" transform="rotate(-15 23 6)"/>
    <!-- tiny feet -->
    <ellipse cx="12" cy="42" rx="4" ry="2.5" fill="#d8e8c8"/>
    <ellipse cx="24" cy="42" rx="4" ry="2.5" fill="#d8e8c8"/>
  </svg>
</div>

<!-- FOREST SPIRIT 2 — sitting on right hill -->
<div class="forest-spirit spirit-sit-right parallax-layer" data-speed="0.04">
  <svg width="28" height="36" viewBox="0 0 28 36" fill="none">
    <ellipse cx="14" cy="24" rx="11" ry="11" fill="#f0f5e0" stroke="#c0d8a0" stroke-width="1"/>
    <circle cx="14" cy="18" r="1.5" fill="#c87850"/>
    <circle cx="10" cy="22" r="2" fill="#2a3a20"/>
    <circle cx="18" cy="22" r="2" fill="#2a3a20"/>
    <circle cx="11" cy="21.5" r="0.8" fill="white"/>
    <circle cx="19" cy="21.5" r="0.8" fill="white"/>
    <!-- O mouth — surprised/curious -->
    <ellipse cx="14" cy="27" rx="2" ry="1.5" fill="#2a3a20" opacity="0.6"/>
    <path d="M5 17 Q3 10 8 13" fill="#90c070"/>
    <path d="M23 17 Q25 10 20 13" fill="#90c070"/>
    <path d="M14 13 Q14 6 17 4" stroke="#6a9a50" stroke-width="1" fill="none" stroke-linecap="round"/>
    <circle cx="18" cy="4" r="2.5" fill="#90c070"/>
    <ellipse cx="9" cy="34" rx="3.5" ry="2" fill="#e0ecd0"/>
    <ellipse cx="19" cy="34" rx="3.5" ry="2" fill="#e0ecd0"/>
  </svg>
</div>

<!-- FOREST SPIRIT 3 — tiny one chasing after the yaka -->
<div class="forest-spirit spirit-follow parallax-layer" data-speed="0.035">
  <svg width="18" height="22" viewBox="0 0 18 22" fill="none">
    <ellipse cx="9" cy="14" rx="7" ry="7" fill="#e8f5d5" stroke="#b8d8a0" stroke-width="0.8"/>
    <circle cx="7" cy="13" r="1.5" fill="#2a3a20"/>
    <circle cx="11" cy="13" r="1.5" fill="#2a3a20"/>
    <circle cx="7.5" cy="12.5" r="0.6" fill="white"/>
    <circle cx="11.5" cy="12.5" r="0.6" fill="white"/>
    <!-- running open mouth -->
    <ellipse cx="9" cy="16.5" rx="1.5" ry="1" fill="#2a3a20" opacity="0.5"/>
    <path d="M9 7 Q9 3 11 2" stroke="#6a9a50" stroke-width="0.8" fill="none"/>
    <circle cx="12" cy="2" r="1.8" fill="#8ab870"/>
    <ellipse cx="6" cy="21" rx="2.5" ry="1.5" fill="#dae8c8"/>
    <ellipse cx="12" cy="21" rx="2.5" ry="1.5" fill="#dae8c8"/>
  </svg>
</div>

<!-- ELEPHANT SPIRIT — ambling through the meadow -->
<div class="elephant-spirit parallax-layer" data-speed="0.032">
  <svg width="70" height="55" viewBox="0 0 70 55" fill="none">
    <g class="elephant-body">
      <!-- body -->
      <ellipse cx="35" cy="32" rx="22" ry="16" fill="#c8d0d8" stroke="#a0aab4" stroke-width="1"/>
      <!-- head -->
      <circle cx="54" cy="24" r="12" fill="#c8d0d8" stroke="#a0aab4" stroke-width="1"/>
      <!-- ear -->
      <ellipse cx="50" cy="18" rx="8" ry="10" fill="#b8c4d0" stroke="#a0aab4" stroke-width="0.8"/>
      <!-- eye — big kawaii -->
      <circle cx="58" cy="22" r="3" fill="#2a3a30"/>

<!-- ══════════════════════════════════════
     PARALLAX SCRIPT
══════════════════════════════════════ -->
<script>
  const layers = document.querySelectorAll('.parallax-layer');
  let mouseX = 0.5, mouseY = 0.5;
  let currentX = 0.5, currentY = 0.5;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = e.clientY / window.innerHeight;
  });

  function animate() {
    currentX += (mouseX - currentX) * 0.05;
    currentY += (mouseY - currentY) * 0.05;

    layers.forEach(layer => {
      const speed = parseFloat(layer.dataset.speed) || 0.02;
      const x = (currentX - 0.5) * speed * 1000;
      const y = (currentY - 0.5) * speed * 600;
      layer.style.transform = `translate(${x}px, ${y}px)`;
    });

    requestAnimationFrame(animate);
  }

  animate();
</script>
