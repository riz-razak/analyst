<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup A — Lotus Drift</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FFF8F3;
    --card: #FFFFFF;
    --text: #2D1B0E;
    --text-soft: #6B5744;
    --text-muted: #A89888;
    --accent-saffron: #F4A623;
    --accent-lotus: #E88BA8;
    --accent-teal: #3DBCAD;
    --accent-gold: #D4A017;
    --shadow: 0 8px 32px rgba(45, 27, 14, 0.06);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── Floating decorative elements ─── */
  .deco {
    position: fixed;
    pointer-events: none;
    opacity: 0.12;
    z-index: 0;
  }

  .lotus-1 { top: 8%; left: 5%; animation: floatA 6s ease-in-out infinite; }
  .lotus-2 { top: 60%; right: 8%; animation: floatB 7s ease-in-out infinite; }
  .leaf-1 { top: 25%; right: 3%; animation: floatC 8s ease-in-out infinite; transform: rotate(15deg); }
  .leaf-2 { bottom: 15%; left: 8%; animation: floatA 9s ease-in-out infinite; transform: rotate(-20deg); }
  .dot-pattern { top: 40%; left: 2%; animation: breathe 5s ease-in-out infinite; }

  @keyframes floatA {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(2deg); }
  }
  @keyframes floatB {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(-3deg); }
  }
  @keyframes floatC {
    0%, 100% { transform: translateY(0) rotate(15deg); }
    50% { transform: translateY(-15px) rotate(18deg); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.1; }
    50% { transform: scale(1.05); opacity: 0.15; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* ─── Main layout ─── */
  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent-saffron);
    background: rgba(244, 166, 35, 0.08);
    border: 1px solid rgba(244, 166, 35, 0.2);
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 2rem;
    animation: fadeInUp 0.8s ease-out;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 7vw, 4.5rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 0.8rem;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent-saffron) 50%, var(--accent-lotus) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeInUp 0.8s ease-out 0.1s both, shimmer 6s linear infinite;
  }

  .subtitle {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--text-soft);
    max-width: 420px;
    margin-bottom: 2.5rem;
    line-height: 1.7;
    animation: fadeInUp 0.8s ease-out 0.2s both;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent-teal);
    text-decoration: none;
    padding: 12px 28px;
    border: 1px solid rgba(61, 188, 173, 0.25);
    border-radius: 24px;
    background: rgba(61, 188, 173, 0.04);
    transition: all 0.3s ease;
    animation: fadeInUp 0.8s ease-out 0.3s both;
  }
  .cta:hover {
    background: rgba(61, 188, 173, 0.1);
    border-color: rgba(61, 188, 173, 0.4);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(61, 188, 173, 0.12);
  }
  .cta .arrow {
    transition: transform 0.3s ease;
  }
  .cta:hover .arrow {
    transform: translateX(4px);
  }

  .footer {
    margin-top: 4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    animation: fadeInUp 0.8s ease-out 0.4s both;
  }

  /* ─── Decorative divider ─── */
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-saffron), var(--accent-lotus), transparent);
    border-radius: 1px;
    margin: 0 auto 2rem;
    animation: fadeInUp 0.8s ease-out 0.15s both;
  }
</style>
</head>
<body>

<!-- Floating decorative SVGs -->
<svg class="deco lotus-1" width="80" height="80" viewBox="0 0 80 80">
  <g fill="none" stroke="#E88BA8" stroke-width="1.2">
    <ellipse cx="40" cy="50" rx="12" ry="22" transform="rotate(-20 40 40)"/>
    <ellipse cx="40" cy="50" rx="12" ry="22" transform="rotate(20 40 40)"/>
    <ellipse cx="40" cy="50" rx="12" ry="22"/>
    <ellipse cx="40" cy="48" rx="8" ry="16" transform="rotate(-40 40 40)"/>
    <ellipse cx="40" cy="48" rx="8" ry="16" transform="rotate(40 40 40)"/>
    <circle cx="40" cy="42" r="5" fill="#E88BA8" opacity="0.3"/>
  </g>
</svg>

<svg class="deco lotus-2" width="60" height="60" viewBox="0 0 60 60">
  <g fill="none" stroke="#F4A623" stroke-width="1">
    <ellipse cx="30" cy="38" rx="9" ry="17" transform="rotate(-25 30 30)"/>
    <ellipse cx="30" cy="38" rx="9" ry="17" transform="rotate(25 30 30)"/>
    <ellipse cx="30" cy="38" rx="9" ry="17"/>
    <circle cx="30" cy="32" r="4" fill="#F4A623" opacity="0.2"/>
  </g>
</svg>

<svg class="deco leaf-1" width="70" height="100" viewBox="0 0 70 100">
  <path d="M35 10 Q55 35 45 70 Q35 90 25 70 Q15 35 35 10Z" fill="none" stroke="#3DBCAD" stroke-width="1.2"/>
  <path d="M35 20 Q35 50 35 75" fill="none" stroke="#3DBCAD" stroke-width="0.8" opacity="0.5"/>
</svg>

<svg class="deco leaf-2" width="55" height="80" viewBox="0 0 55 80">
  <path d="M28 8 Q45 28 38 55 Q28 72 18 55 Q10 28 28 8Z" fill="none" stroke="#A89888" stroke-width="1"/>
  <path d="M28 15 Q28 40 28 60" fill="none" stroke="#A89888" stroke-width="0.6" opacity="0.4"/>
</svg>

<svg class="deco dot-pattern" width="100" height="100" viewBox="0 0 100 100">
  <g fill="#F4A623" opacity="0.4">
    <circle cx="10" cy="10" r="2"/><circle cx="30" cy="10" r="2"/><circle cx="50" cy="10" r="2"/><circle cx="70" cy="10" r="2"/><circle cx="90" cy="10" r="2"/>
    <circle cx="20" cy="30" r="2"/><circle cx="40" cy="30" r="2"/><circle cx="60" cy="30" r="2"/><circle cx="80" cy="30" r="2"/>
    <circle cx="10" cy="50" r="2"/><circle cx="30" cy="50" r="2"/><circle cx="50" cy="50" r="2"/><circle cx="70" cy="50" r="2"/><circle cx="90" cy="50" r="2"/>
    <circle cx="20" cy="70" r="2"/><circle cx="40" cy="70" r="2"/><circle cx="60" cy="70" r="2"/><circle cx="80" cy="70" r="2"/>
    <circle cx="10" cy="90" r="2"/><circle cx="30" cy="90" r="2"/><circle cx="50" cy="90" r="2"/><circle cx="70" cy="90" r="2"/><circle cx="90" cy="90" r="2"/>
  </g>
</svg>

<div class="container">
  <span class="tag">Coming Soon</span>
  <div class="divider"></div>
  <h1>Riz Razak</h1>
  <p class="subtitle">Personal site under construction. Something interesting is brewing.</p>
  <a href="https://analyst.rizrazak.com/" class="cta">
    For now, enjoy the deep analysis <span class="arrow">&rarr;</span> analyst.rizrazak.com
  </a>
  <p class="footer">&copy; 2026 Riz Razak</p>
</div>

</body>
</html>
