<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riz Razak</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    background: #1a2a1a;
    min-height: 100vh;
    cursor: default;
  }

  /* ═══════════════════════════════════════════
     CANVAS — Full viewport painted scene
  ═══════════════════════════════════════════ */

  .scene { position: fixed; inset: 0; overflow: hidden; }

  /* ── SKY ── */
  .sky {
    position: absolute; top: 0; left: 0; width: 100%; height: 55%;
    background: linear-gradient(180deg,
      #c8d8e4 0%,
      #d8e2ea 15%,
      #e4ecf0 30%,
      #edf2f0 45%,
      #f0f2ec 60%,
      #e8ece4 75%,
      #dae4d8 100%
    );
  }

  /* Atmospheric haze layers */
  .haze {
    position: absolute;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .haze-1 {
    background: radial-gradient(ellipse 120% 40% at 30% 55%, rgba(200,215,200,0.5) 0%, transparent 70%);
  }
  .haze-2 {
    background: radial-gradient(ellipse 100% 35% at 70% 50%, rgba(190,210,200,0.4) 0%, transparent 65%);
  }
  .haze-3 {
    background: radial-gradient(ellipse 80% 25% at 50% 58%, rgba(210,220,210,0.35) 0%, transparent 60%);
    animation: haze-drift 30s ease-in-out infinite;
  }

  @keyframes haze-drift {
    0%, 100% { transform: translateX(0); opacity: 0.35; }
    50% { transform: translateX(30px); opacity: 0.5; }
  }

  /* ── CLOUDS ── */
  .clouds { position: absolute; top: 0; left: 0; width: 100%; height: 40%; }

  .cloud {
    position: absolute;
    filter: blur(2px);
    opacity: 0;
    animation: cloud-life linear infinite;
  }
  .cloud svg { width: 100%; height: 100%; }

  .cloud-a { top: 5%;  width: 350px; animation-duration: 90s; animation-delay: 0s; }
  .cloud-b { top: 10%; width: 250px; animation-duration: 110s; animation-delay: -35s; }
  .cloud-c { top: 2%;  width: 300px; animation-duration: 100s; animation-delay: -60s; }
  .cloud-d { top: 15%; width: 180px; animation-duration: 120s; animation-delay: -80s; }

  @keyframes cloud-life {
    0%   { transform: translateX(-400px); opacity: 0; }
    5%   { opacity: 0.25; }
    50%  { opacity: 0.35; }
    95%  { opacity: 0.2; }
    100% { transform: translateX(calc(100vw + 400px)); opacity: 0; }
  }

  /* ── MOUNTAINS — distant, misty, layered ── */
  .mountains {
    position: absolute;
    bottom: 30%;
    left: -10%;
    width: 120%;
    height: 40%;
  }

  .mountain-layer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
  }

  /* Farthest mountains — very pale, almost gone */
  .mtn-far {
    height: 100%;
    opacity: 0.4;
  }
  .mtn-far svg { width: 100%; height: 100%; }

  /* Mid mountains */
  .mtn-mid {
    height: 80%;
    opacity: 0.55;
  }
  .mtn-mid svg { width: 100%; height: 100%; }

  /* Near mountains with tea terraces */
  .mtn-near {
    height: 65%;
    opacity: 0.7;
  }
  .mtn-near svg { width: 100%; height: 100%; }

  /* ── FOREST — layered trees ── */
  .forest {
    position: absolute;
    bottom: 0;
    left: -5%;
    width: 110%;
    height: 55%;
  }

  /* Tree layer — deep background */
  .trees-deep {
    position: absolute;
    bottom: 20%;
    left: 0;
    width: 100%;
    height: 35%;
    opacity: 0.5;
  }

  /* Tree layer — mid */
  .trees-mid {
    position: absolute;
    bottom: 10%;
    left: 0;
    width: 100%;
    height: 40%;
    opacity: 0.7;
  }

  /* Tree layer — near (detailed) */
  .trees-near {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 45%;
    opacity: 0.85;
  }

  /* ── GROUND — mossy forest floor ── */
  .forest-floor {
    position: absolute;
    bottom: 0;
    left: -5%;
    width: 110%;
    height: 22%;
    background: linear-gradient(180deg,
      rgba(45,75,40,0) 0%,
      rgba(45,75,40,0.6) 15%,
      #2d5028 30%,
      #264822 50%,
      #1f3d1c 70%,
      #1a3518 100%
    );
  }

  /* Moss patches */
  .moss {
    position: absolute;
    border-radius: 50%;
    opacity: 0.3;
  }
  .moss-1 { bottom: 2%; left: 10%; width: 180px; height: 40px; background: radial-gradient(ellipse, #4a8a3a, transparent); }
  .moss-2 { bottom: 5%; left: 35%; width: 120px; height: 30px; background: radial-gradient(ellipse, #3a7a2a, transparent); }
  .moss-3 { bottom: 1%; left: 60%; width: 200px; height: 45px; background: radial-gradient(ellipse, #4a8a3a, transparent); }
  .moss-4 { bottom: 4%; left: 80%; width: 140px; height: 35px; background: radial-gradient(ellipse, #3a7a2a, transparent); }

  /* ── MIST — rolling through the trees ── */
  .mist-layer {
    position: absolute;
    left: -20%;
    width: 140%;
    height: 15%;
    opacity: 0;
    filter: blur(8px);
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(200,215,200,0.3) 20%,
      rgba(210,225,210,0.5) 40%,
      rgba(200,215,200,0.4) 60%,
      rgba(190,210,195,0.3) 80%,
      transparent 100%
    );
  }

  .mist-1 {
    bottom: 28%;
    animation: mist-roll 25s ease-in-out infinite;
  }
  .mist-2 {
    bottom: 22%;
    animation: mist-roll 35s ease-in-out infinite 10s;
  }
  .mist-3 {
    bottom: 35%;
    animation: mist-roll 40s ease-in-out infinite 5s;
    height: 10%;
  }

  @keyframes mist-roll {
    0%   { transform: translateX(-15%); opacity: 0; }
    15%  { opacity: 0.4; }
    50%  { transform: translateX(10%); opacity: 0.6; }
    85%  { opacity: 0.3; }
    100% { transform: translateX(-15%); opacity: 0; }
  }

  /* ── LIGHT RAYS — god rays through canopy ── */
  .light-rays {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  .ray {
    position: absolute;
    top: -10%;
    width: 3px;
    height: 70%;
    background: linear-gradient(180deg,
      rgba(255,250,220,0) 0%,
      rgba(255,250,220,0.08) 20%,
      rgba(255,250,220,0.15) 50%,
      rgba(255,250,220,0.08) 80%,
      rgba(255,250,220,0) 100%
    );
    transform-origin: top center;
    animation: ray-shimmer 8s ease-in-out infinite;
  }
  .ray-1 { left: 20%; transform: rotate(8deg); width: 4px; animation-delay: 0s; }
  .ray-2 { left: 35%; transform: rotate(3deg); width: 2px; animation-delay: 2s; }
  .ray-3 { left: 55%; transform: rotate(-5deg); width: 5px; animation-delay: 4s; }
  .ray-4 { left: 72%; transform: rotate(-10deg); width: 3px; animation-delay: 1s; }
  .ray-5 { left: 45%; transform: rotate(1deg); width: 2px; animation-delay: 6s; }

  @keyframes ray-shimmer {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* ── FIREFLIES / PARTICLES ── */
  .firefly {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(200,230,150,0.7);
    box-shadow: 0 0 8px 2px rgba(200,230,150,0.4);
    animation: firefly-float linear infinite;
  }

  .ff-1 { bottom: 30%; left: 15%; animation-duration: 12s; }
  .ff-2 { bottom: 25%; left: 40%; animation-duration: 15s; animation-delay: -5s; width:3px;height:3px; }
  .ff-3 { bottom: 35%; left: 65%; animation-duration: 18s; animation-delay: -8s; }
  .ff-4 { bottom: 20%; left: 80%; animation-duration: 14s; animation-delay: -3s; width:3px;height:3px; }
  .ff-5 { bottom: 32%; left: 50%; animation-duration: 16s; animation-delay: -11s; }
  .ff-6 { bottom: 28%; left: 25%; animation-duration: 20s; animation-delay: -7s; width:2px;height:2px; }
  .ff-7 { bottom: 38%; left: 72%; animation-duration: 13s; animation-delay: -2s; }

  @keyframes firefly-float {
    0%   { transform: translate(0, 0) scale(1); opacity: 0; }
    10%  { opacity: 0.8; }
    25%  { transform: translate(20px, -30px) scale(1.2); }
    50%  { transform: translate(-10px, -50px) scale(0.8); opacity: 0.5; }
    75%  { transform: translate(30px, -20px) scale(1.1); opacity: 0.9; }
    90%  { opacity: 0.6; }
    100% { transform: translate(0, 0) scale(1); opacity: 0; }
  }

  /* ── FALLING LEAVES ── */
  .leaf {
    position: absolute;
    top: -5%;
    opacity: 0;
    animation: leaf-fall linear infinite;
  }
  .leaf svg { width: 100%; height: 100%; }

  .leaf-1 { left: 20%; width: 16px; animation-duration: 18s; animation-delay: 0s; }
  .leaf-2 { left: 45%; width: 12px; animation-duration: 22s; animation-delay: -6s; }
  .leaf-3 { left: 70%; width: 14px; animation-duration: 20s; animation-delay: -12s; }
  .leaf-4 { left: 35%; width: 10px; animation-duration: 25s; animation-delay: -18s; }
  .leaf-5 { left: 85%; width: 13px; animation-duration: 19s; animation-delay: -4s; }

  @keyframes leaf-fall {
    0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
    5%   { opacity: 0.6; }
    25%  { transform: translate(40px, 25vh) rotate(90deg); }
    50%  { transform: translate(-20px, 50vh) rotate(200deg); opacity: 0.5; }
    75%  { transform: translate(30px, 75vh) rotate(300deg); opacity: 0.3; }
    100% { transform: translate(10px, 105vh) rotate(400deg); opacity: 0; }
  }

  /* ═══════════════════════════════════════════
     CHARACTER PLACEHOLDERS
     (will be replaced with AI-generated PNGs)
  ═══════════════════════════════════════════ */

  .character {
    position: absolute;
    image-rendering: auto;
    /* For now: placeholder silhouettes with glow */
  }

  /* Character placeholder style — glowing silhouette */
  .char-placeholder {
    position: absolute;
    filter: blur(0.5px);
  }

  /* Spirit on tree branch — sits and sways */
  .spirit-tree {
    bottom: 42%; left: 12%;
    width: 45px; height: 55px;
    z-index: 15;
    animation: spirit-sit-sway 4s ease-in-out infinite;
  }
  @keyframes spirit-sit-sway {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-5px) rotate(2deg); }
  }

  /* Elephant ambling through clearing */
  .elephant-walk {
    bottom: 16%; left: 30%;
    width: 80px; height: 60px;
    z-index: 14;
    animation: elephant-amble 24s ease-in-out infinite;
  }
  @keyframes elephant-amble {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(80px); }
  }
  .elephant-body-step {
    animation: step-bounce 1.2s ease-in-out infinite;
  }
  @keyframes step-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* Leopard resting on a rock, tail swishing */
  .leopard-rest {
    bottom: 22%; right: 15%;
    width: 65px; height: 35px;
    z-index: 14;
    animation: cat-breathe 3s ease-in-out infinite;
  }
  @keyframes cat-breathe {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.03); }
  }

  /* Peacock strutting */
  .peacock-strut {
    bottom: 14%; right: 35%;
    width: 55px; height: 55px;
    z-index: 14;
    animation: peacock-walk 18s ease-in-out infinite;
  }
  @keyframes peacock-walk {
    0%, 100% { transform: translateX(0) scaleX(1); }
    45% { transform: translateX(-60px) scaleX(1); }
    50% { transform: translateX(-60px) scaleX(-1); }
    95% { transform: translateX(0) scaleX(-1); }
  }

  /* Baby yaka — peeks from behind a tree on left */
  .yaka-tree-left {
    bottom: 30%; left: 5%;
    width: 38px; height: 48px;
    z-index: 16;
    animation: yaka-peek-tree 10s ease-in-out infinite;
  }
  @keyframes yaka-peek-tree {
    0%, 100% { transform: translateX(-30px) rotate(0deg); opacity: 0; }
    20% { transform: translateX(0px) rotate(-5deg); opacity: 1; }
    30% { transform: translateX(5px) rotate(5deg); opacity: 1; }
    40% { transform: translateX(3px) rotate(-8deg); opacity: 1; }
    55% { transform: translateX(0px) rotate(0deg); opacity: 1; }
    65% { transform: translateX(-30px) rotate(0deg); opacity: 0; }
  }

  /* Baby yaka — scurries across the forest floor */
  .yaka-scurry {
    bottom: 8%;
    left: -80px;
    width: 40px; height: 45px;
    z-index: 17;
    animation: scurry-forest 16s ease-in-out infinite 4s;
  }
  @keyframes scurry-forest {
    0%   { left: -80px; bottom: 8%; }
    10%  { left: 10%;   bottom: 9%; }
    20%  { left: 22%;   bottom: 7%; }
    25%  { left: 28%;   bottom: 12%; } /* jumps over root */
    30%  { left: 35%;   bottom: 8%; }
    40%  { left: 45%;   bottom: 8%; } /* pauses, looks around */
    45%  { left: 45%;   bottom: 8%; }
    55%  { left: 58%;   bottom: 9%; }
    65%  { left: 70%;   bottom: 7%; }
    75%  { left: 82%;   bottom: 11%; } /* another jump */
    80%  { left: 88%;   bottom: 8%; }
    95%  { left: calc(100% + 40px); bottom: 8%; }
    100% { left: calc(100% + 80px); bottom: 8%; }
  }

  .yaka-bounce {
    animation: run-bounce 0.3s ease-in-out infinite;
  }
  @keyframes run-bounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-8px) rotate(5deg); }
  }

  /* Small forest spirit following yaka */
  .spirit-chase {
    bottom: 8%;
    left: -60px;
    width: 22px; height: 28px;
    z-index: 16;
    animation: scurry-forest 16s ease-in-out infinite 5.5s;
  }

  .mini-bounce {
    animation: run-bounce 0.25s ease-in-out infinite;
  }

  /* ═══════════════════════════════════════════
     PLACEHOLDER CHARACTER SVGS
     (Detailed enough for now — will swap for AI art)
  ═══════════════════════════════════════════ */

  /* These are intentionally more detailed than the previous mockup */

  /* ═══════════════════════════════════════════
     CONTENT
  ═══════════════════════════════════════════ */
  .content-layer {
    position: relative;
    z-index: 30;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    pointer-events: none;
  }

  .card {
    background: rgba(240, 245, 238, 0.65);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 420px;
    width: 100%;
    pointer-events: auto;
    box-shadow:
      0 8px 40px rgba(30, 60, 20, 0.15),
      0 1px 3px rgba(0,0,0,0.05);
    border: 1px solid rgba(255,255,255,0.4);
    animation: card-in 1.2s ease-out 0.5s both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6a8060;
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 2.1rem;
    font-weight: 600;
    color: #1a2a15;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .tagline {
    font-size: 0.9rem;
    color: #4a6040;
    font-weight: 300;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .cta {
    display: inline-block;
    font-size: 0.82rem;
    color: #2a5020;
    text-decoration: none;
    padding: 0.65rem 1.5rem;
    border-radius: 50px;
    border: 1.5px solid rgba(42, 80, 32, 0.25);
    background: rgba(42, 80, 32, 0.05);
    transition: all 0.3s ease;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .cta:hover {
    background: rgba(42, 80, 32, 0.12);
    border-color: rgba(42, 80, 32, 0.4);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(42, 80, 32, 0.15);
  }

  /* Parallax layers */
  .parallax { transition: transform 0.12s ease-out; }
</style>
</head>
<body>

<div class="scene">

  <!-- SKY -->
  <div class="sky parallax" data-speed="0.005"></div>

  <!-- ATMOSPHERIC HAZE -->
  <div class="haze haze-1"></div>
  <div class="haze haze-2"></div>
  <div class="haze haze-3 parallax" data-speed="0.008"></div>

  <!-- CLOUDS -->
  <div class="clouds parallax" data-speed="0.01">
    <div class="cloud cloud-a">
      <svg viewBox="0 0 350 100"><ellipse cx="175" cy="55" rx="160" ry="35" fill="white" opacity="0.7"/><ellipse cx="120" cy="45" rx="100" ry="40" fill="white" opacity="0.8"/><ellipse cx="240" cy="48" rx="90" ry="32" fill="white" opacity="0.75"/><ellipse cx="160" cy="40" rx="80" ry="30" fill="white" opacity="0.6"/></svg>
    </div>
    <div class="cloud cloud-b">
      <svg viewBox="0 0 250 80"><ellipse cx="125" cy="45" rx="110" ry="28" fill="white" opacity="0.75"/><ellipse cx="80" cy="38" rx="70" ry="32" fill="white" opacity="0.8"/><ellipse cx="170" cy="40" rx="60" ry="25" fill="white" opacity="0.7"/></svg>
    </div>
    <div class="cloud cloud-c">
      <svg viewBox="0 0 300 90"><ellipse cx="150" cy="50" rx="140" ry="32" fill="white" opacity="0.7"/><ellipse cx="100" cy="42" rx="90" ry="36" fill="white" opacity="0.8"/><ellipse cx="210" cy="44" rx="75" ry="28" fill="white" opacity="0.72"/></svg>
    </div>
    <div class="cloud cloud-d">
      <svg viewBox="0 0 180 60"><ellipse cx="90" cy="35" rx="80" ry="22" fill="white" opacity="0.75"/><ellipse cx="60" cy="28" rx="55" ry="26" fill="white" opacity="0.8"/></svg>
    </div>
  </div>

  <!-- MOUNTAINS — layered depth -->
  <div class="mountains parallax" data-speed="0.015">
    <!-- Farthest range — pale blue-green -->
    <div class="mountain-layer mtn-far">
      <svg viewBox="0 0 1200 400" preserveAspectRatio="none" width="100%" height="100%">
        <defs>
          <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#a0b8a8" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#8aaa90" stop-opacity="0.7"/>
          </linearGradient>
        </defs>
        <path d="M0,400 L0,250 Q100,120 200,180 Q300,80 400,150 Q500,50 600,120 Q700,30 800,100 Q900,60 1000,140 Q1100,90 1200,180 L1200,400 Z" fill="url(#mtnFar)"/>
      </svg>
    </div>

    <!-- Mid range — green with hints of tea terraces -->
    <div class="mountain-layer mtn-mid">
      <svg viewBox="0 0 1200 320" preserveAspectRatio="none" width="100%" height="100%">
        <defs>
          <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6a9a68"/>
            <stop offset="60%" stop-color="#5a8a58"/>
            <stop offset="100%" stop-color="#4a7a48"/>
          </linearGradient>
        </defs>
        <path d="M0,320 L0,200 Q80,100 180,160 Q280,60 380,120 Q500,40 620,110 Q740,30 850,90 Q960,50 1060,120 Q1140,80 1200,140 L1200,320 Z" fill="url(#mtnMid)"/>
        <!-- Tea terrace lines -->
        <path d="M300,130 Q400,95 500,120" stroke="rgba(90,140,80,0.3)" stroke-width="1" fill="none"/>
        <path d="M310,140 Q410,105 510,130" stroke="rgba(90,140,80,0.25)" stroke-width="1" fill="none"/>
        <path d="M320,150 Q420,115 520,140" stroke="rgba(90,140,80,0.2)" stroke-width="1" fill="none"/>
        <path d="M700,100 Q800,70 900,95" stroke="rgba(90,140,80,0.3)" stroke-width="1" fill="none"/>
        <path d="M710,110 Q810,80 910,105" stroke="rgba(90,140,80,0.25)" stroke-width="1" fill="none"/>
      </svg>
    </div>

    <!-- Near range — rich deep green -->
    <div class="mountain-layer mtn-near">
      <svg viewBox="0 0 1200 260" preserveAspectRatio="none" width="100%" height="100%">
        <defs>
          <linearGradient id="mtnNear" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4a8040"/>
            <stop offset="50%" stop-color="#3a7030"/>
            <stop offset="100%" stop-color="#2d5a28"/>
          </linearGradient>
        </defs>
        <path d="M0,260 L0,140 Q100,60 220,100 Q340,20 460,80 Q580,30 680,70 Q800,10 920,60 Q1020,25 1100,80 Q1160,50 1200,90 L1200,260 Z" fill="url(#mtnNear)"/>
        <!-- More visible terraces on near mountains -->
        <path d="M100,110 Q200,75 300,100" stroke="rgba(60,110,50,0.4)" stroke-width="1.5" fill="none"/>
        <path d="M110,120 Q210,85 310,110" stroke="rgba(60,110,50,0.35)" stroke-width="1.5" fill="none"/>

<!-- PARALLAX + ANIMATION ENGINE -->
<script>
  // Parallax
  const layers = document.querySelectorAll('.parallax');
  let mx = 0.5, my = 0.5, cx = 0.5, cy = 0.5;

  document.addEventListener('mousemove', e => {
    mx = e.clientX / window.innerWidth;
    my = e.clientY / window.innerHeight;
  });

  (function animate() {
    cx += (mx - cx) * 0.04;
    cy += (my - cy) * 0.04;

    layers.forEach(l => {
      const s = parseFloat(l.dataset.speed) || 0.02;
      const x = (cx - 0.5) * s * 1200;
      const y = (cy - 0.5) * s * 700;
      // Preserve any existing animation transforms by only applying parallax translation
      l.style.transform = `translate(${x}px, ${y}px)`;
    });

    requestAnimationFrame(animate);
  })();

  // Blink animation for yaka eyes
  const style = document.createElement('style');
  style.textContent = `
    @keyframes blink-eyes {
      0%, 42%, 58%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.05); }
    }
    @keyframes hair-wild {
      0%, 100% { transform: rotate(-5deg) translateX(3px); }
      50% { transform: rotate(5deg) translateX(-3px); }
    }
    @keyframes arms-pump {
      0%, 100% { transform: rotate(-20deg); }
      50% { transform: rotate(20deg); }
    }
  `;
  document.head.appendChild(style);
</script>
