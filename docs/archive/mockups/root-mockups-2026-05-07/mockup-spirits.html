<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riz Razak</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FDF8F2;
    --text: #2A1D10;
    --text-soft: #6B5A48;
    --text-muted: #B8A898;
    --saffron: #E8A020;
    --lotus: #D4899F;
    --teal: #5BB8B0;
  }

  html, body {
    font-family: 'Quicksand', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ═══ DREAMY BACKGROUND GLOWS ═══ */
  .dream-bg {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .glow {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0;
    animation: glowIn 2s ease-out forwards;
  }
  .glow-1 { width:500px;height:500px;background:radial-gradient(circle,rgba(232,160,32,0.07) 0%,transparent 70%);top:-10%;right:-5%;animation-delay:0.3s; }
  .glow-2 { width:400px;height:400px;background:radial-gradient(circle,rgba(212,137,159,0.05) 0%,transparent 70%);bottom:-5%;left:-5%;animation-delay:0.6s; }
  .glow-3 { width:350px;height:350px;background:radial-gradient(circle,rgba(91,184,176,0.04) 0%,transparent 70%);top:40%;left:50%;transform:translateX(-50%);animation-delay:0.9s; }

  @keyframes glowIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }

  /* ═══ FLOATING PARTICLES ═══ */
  .particles { position:fixed;inset:0;pointer-events:none;z-index:0; }
  .particle {
    position:absolute;border-radius:50%;opacity:0;
    animation: particleDrift linear infinite;
  }
  @keyframes particleDrift {
    0%{opacity:0;transform:translateY(100vh) translateX(0)}
    10%{opacity:0.35}
    90%{opacity:0.35}
    100%{opacity:0;transform:translateY(-10vh) translateX(30px)}
  }

  /* ═══ PARALLAX LAYERS ═══ */
  .parallax-layer {
    position:fixed;inset:0;pointer-events:none;z-index:0;
    transition:transform 0.3s ease-out;
  }
  .float-element {
    position:absolute;opacity:0;
    animation: floatReveal 1.5s ease-out forwards;
  }
  @keyframes floatReveal { from{opacity:0;transform:translateY(20px) scale(0.9)} to{opacity:1;transform:translateY(0) scale(1)} }

  .drift-1 { animation: drift1 8s ease-in-out infinite; }
  .drift-2 { animation: drift2 10s ease-in-out infinite; }
  .drift-3 { animation: drift3 12s ease-in-out infinite; }

  @keyframes drift1 { 0%,100%{transform:translate(0,0) rotate(0deg)} 25%{transform:translate(8px,-12px) rotate(2deg)} 50%{transform:translate(-4px,-8px) rotate(-1deg)} 75%{transform:translate(6px,-4px) rotate(1.5deg)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-10px,-8px) rotate(-2deg)} 66%{transform:translate(6px,-14px) rotate(1deg)} }
  @keyframes drift3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(12px,-10px) rotate(3deg)} }

  /* ═══════════════════════════════════════════
     SPIRIT CREATURES
     ═══════════════════════════════════════════ */

  .spirit-layer {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1;
    overflow: hidden;
  }

  .spirit {
    position: absolute;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  /* ─── Forest Spirits (Kodama × Sri Lankan) ─── */
  /* Small glowing orbs with tiny mask-like faces, bob gently */
  .forest-spirit {
    animation: spiritBob 4s ease-in-out infinite;
  }
  @keyframes spiritBob {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-8px) scale(1.03); }
  }

  /* Occasional head-tilt */
  .spirit-tilt {
    animation: spiritTilt 6s ease-in-out infinite;
  }
  @keyframes spiritTilt {
    0%, 40%, 100% { transform: rotate(0deg); }
    20% { transform: rotate(8deg); }
    60% { transform: rotate(-5deg); }
    80% { transform: rotate(3deg); }
  }

  /* ─── Animal Spirits ─── */
  /* Peacock spirit: slow tail fan */
  .peacock-fan {
    transform-origin: 50% 100%;
    animation: fanTail 5s ease-in-out infinite;
  }
  @keyframes fanTail {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(1.1); }
  }

  /* Elephant spirit: gentle trunk sway */
  .trunk-sway {
    transform-origin: 50% 0%;
    animation: trunkSway 4s ease-in-out infinite;
  }
  @keyframes trunkSway {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(5deg); }
    75% { transform: rotate(-5deg); }
  }

  /* Leopard spirit: breathe + blink */
  .leopard-breathe {
    animation: leopardBreathe 3.5s ease-in-out infinite;
  }
  @keyframes leopardBreathe {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.02); }
  }

  /* ─── Baby Yaka ─── */
  /* Peeks from edges, scurries across, hides behind things */
  .baby-yaka {
    position: absolute;
    opacity: 0;
  }

  /* Peek animation — slides in from edge, looks around, retreats */
  @keyframes yakaPeekLeft {
    0% { transform: translateX(-100%) rotate(0deg); opacity: 0; }
    8% { transform: translateX(0%) rotate(0deg); opacity: 0.12; }
    12% { transform: translateX(5px) rotate(5deg); opacity: 0.12; }
    16% { transform: translateX(0%) rotate(-3deg); opacity: 0.12; }
    22% { transform: translateX(5px) rotate(0deg); opacity: 0.12; }
    28% { transform: translateX(-100%) rotate(0deg); opacity: 0; }
    100% { transform: translateX(-100%) rotate(0deg); opacity: 0; }
  }

  @keyframes yakaPeekRight {
    0% { transform: translateX(100%) scaleX(-1) rotate(0deg); opacity: 0; }
    8% { transform: translateX(0%) scaleX(-1) rotate(0deg); opacity: 0.12; }
    12% { transform: translateX(-5px) scaleX(-1) rotate(5deg); opacity: 0.12; }
    16% { transform: translateX(0%) scaleX(-1) rotate(-3deg); opacity: 0.12; }
    22% { transform: translateX(-5px) scaleX(-1) rotate(0deg); opacity: 0.12; }
    28% { transform: translateX(100%) scaleX(-1) rotate(0deg); opacity: 0; }
    100% { transform: translateX(100%) scaleX(-1) rotate(0deg); opacity: 0; }
  }

  /* Scurry across screen */
  @keyframes yakaScurry {
    0% { transform: translateX(-80px) scaleX(1); opacity: 0; }
    5% { opacity: 0.1; }
    8% { transform: translateX(0px) scaleX(1) translateY(0); }
    12% { transform: translateX(60px) scaleX(1) translateY(-8px); }
    16% { transform: translateX(140px) scaleX(1) translateY(0); }
    20% { transform: translateX(200px) scaleX(1) translateY(-5px); }
    24% { transform: translateX(280px) scaleX(1) translateY(0); opacity: 0.1; }
    28% { transform: translateX(350px) scaleX(1); opacity: 0; }
    100% { transform: translateX(350px); opacity: 0; }
  }

  .yaka-peek-left {
    animation: yakaPeekLeft 16s ease-in-out infinite;
  }
  .yaka-peek-right {
    animation: yakaPeekRight 20s ease-in-out infinite;
    animation-delay: 8s;
  }
  .yaka-scurry {
    animation: yakaScurry 24s ease-in-out infinite;
    animation-delay: 12s;
  }

  /* ═══ MAIN CONTENT ═══ */
  .container {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ornament-top {
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeIn 1s ease-out 0.5s forwards;
  }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--saffron);
    opacity: 0; animation: fadeInUp 1s ease-out 0.7s forwards;
    margin-bottom: 1.2rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 700; line-height: 1.1;
    letter-spacing: -0.5px; margin-bottom: 0.5rem;
    opacity: 0; animation: fadeInUp 1s ease-out 0.9s forwards;
    background: linear-gradient(135deg, var(--text) 30%, var(--saffron) 70%, var(--lotus) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .line {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--saffron), var(--lotus), transparent);
    border-radius: 1px; margin: 1rem auto 1.5rem;
    opacity: 0; animation: fadeInUp 1s ease-out 1s forwards;
  }

  .subtitle {
    font-size: 1rem; font-weight: 300;
    color: var(--text-soft); max-width: 360px;
    line-height: 1.8; margin-bottom: 2.8rem;
    opacity: 0; animation: fadeInUp 1s ease-out 1.1s forwards;
  }

  .cta-wrapper { opacity: 0; animation: fadeInUp 1s ease-out 1.3s forwards; }

  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Quicksand', sans-serif;
    font-size: 0.82rem; font-weight: 500;
    color: var(--text-soft); text-decoration: none;
    padding: 14px 32px; border-radius: 32px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(232,160,32,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
    box-shadow: 0 4px 20px rgba(232,160,32,0.06);
  }
  .cta:hover {
    background: rgba(255,255,255,0.85);
    border-color: rgba(232,160,32,0.3);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(232,160,32,0.12);
    color: var(--text);
  }
  .cta .arrow { display:inline-block;transition:transform 0.4s ease;font-size:1.1rem; }
  .cta:hover .arrow { transform: translateX(5px); }

  .footer {
    margin-top: 4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; color: var(--text-muted);
    opacity: 0; animation: fadeInUp 1s ease-out 1.5s forwards;
    letter-spacing: 0.5px;
  }

  @media (max-width: 600px) {
    .glow { filter: blur(60px); }
    .spirit-layer svg { transform: scale(0.7); }
  }
</style>
</head>
<body>

<!-- ═══ DREAMY BACKGROUND ═══ -->
<div class="dream-bg">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>
</div>

<!-- ═══ PARTICLES ═══ -->
<div class="particles">
  <div class="particle" style="left:12%;width:3px;height:3px;background:rgba(232,160,32,0.3);animation-duration:18s;animation-delay:0s"></div>
  <div class="particle" style="left:28%;width:2px;height:2px;background:rgba(212,137,159,0.25);animation-duration:22s;animation-delay:3s"></div>
  <div class="particle" style="left:55%;width:3px;height:3px;background:rgba(91,184,176,0.2);animation-duration:20s;animation-delay:6s"></div>
  <div class="particle" style="left:72%;width:2px;height:2px;background:rgba(232,160,32,0.2);animation-duration:24s;animation-delay:2s"></div>
  <div class="particle" style="left:88%;width:2.5px;height:2.5px;background:rgba(212,137,159,0.18);animation-duration:19s;animation-delay:8s"></div>
  <div class="particle" style="left:40%;width:2px;height:2px;background:rgba(91,184,176,0.15);animation-duration:25s;animation-delay:5s"></div>
</div>

<!-- ═══ PARALLAX NATURE ELEMENTS ═══ -->
<div class="parallax-layer" id="layer1">
  <div class="float-element drift-1" style="top:10%;left:6%;animation-delay:0.8s">
    <svg width="50" height="50" viewBox="0 0 50 50" style="opacity:0.06">
      <g fill="none" stroke="#D4899F" stroke-width="0.7">
        <ellipse cx="25" cy="32" rx="8" ry="16" transform="rotate(-18 25 25)"/>
        <ellipse cx="25" cy="32" rx="8" ry="16" transform="rotate(18 25 25)"/>
        <ellipse cx="25" cy="32" rx="8" ry="16"/>
        <circle cx="25" cy="26" r="3" fill="#D4899F" opacity="0.12"/>
      </g>
    </svg>
  </div>
  <div class="float-element drift-3" style="bottom:22%;right:7%;animation-delay:1.2s">
    <svg width="55" height="55" viewBox="0 0 55 55" style="opacity:0.05">
      <g fill="#E8A020"><circle cx="10" cy="10" r="1.5"/><circle cx="27" cy="10" r="1.5"/><circle cx="44" cy="10" r="1.5"/><circle cx="18" cy="24" r="1.5"/><circle cx="36" cy="24" r="1.5"/><circle cx="10" cy="38" r="1.5"/><circle cx="27" cy="38" r="1.5"/><circle cx="44" cy="38" r="1.5"/></g>
    </svg>
  </div>
</div>
<div class="parallax-layer" id="layer2">
  <div class="float-element drift-2" style="top:32%;right:5%;animation-delay:1s">
    <svg width="35" height="55" viewBox="0 0 35 55" style="opacity:0.05">
      <path d="M17 5 Q30 18 24 38 Q17 48 10 38 Q4 18 17 5Z" fill="none" stroke="#5BB8B0" stroke-width="0.7"/>
      <path d="M17 10 Q17 28 17 42" fill="none" stroke="#5BB8B0" stroke-width="0.4" opacity="0.5"/>
    </svg>
  </div>
</div>
<div class="parallax-layer" id="layer3">
  <div class="float-element drift-1" style="bottom:12%;left:12%;animation-delay:1.6s">
    <svg width="100" height="20" viewBox="0 0 100 20" style="opacity:0.04">
      <path d="M0,12 Q25,0 50,12 Q75,24 100,12" fill="none" stroke="#5BB8B0" stroke-width="0.8"/>
    </svg>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     SPIRIT CREATURES LAYER
     Miyazaki-kami style × Sri Lankan folklore
     ═══════════════════════════════════════════════════ -->
<div class="spirit-layer" id="spiritLayer">

  <!-- ── FOREST SPIRIT 1: Small glowing orb-creature with kolam-face ── -->
  <!-- Top-left area, bobs gently, tilts head -->
  <div class="spirit forest-spirit" style="top:18%;left:10%;opacity:0.1;animation-delay:2s">
    <div class="spirit-tilt">
      <svg width="28" height="34" viewBox="0 0 28 34">
        <g>
          <!-- Body: soft rounded blob -->
          <ellipse cx="14" cy="20" rx="11" ry="13" fill="#E8A020" opacity="0.12"/>
          <ellipse cx="14" cy="20" rx="11" ry="13" fill="none" stroke="#E8A020" stroke-width="0.5" opacity="0.2"/>
          <!-- Face: two dots for eyes, tiny curve mouth -->
          <circle cx="10" cy="18" r="1.2" fill="#2A1D10" opacity="0.3"/>
          <circle cx="18" cy="18" r="1.2" fill="#2A1D10" opacity="0.3"/>
          <path d="M11 22 Q14 24 17 22" fill="none" stroke="#2A1D10" stroke-width="0.6" opacity="0.2"/>
          <!-- Small kolam dot on forehead -->
          <circle cx="14" cy="14" r="0.8" fill="#E8A020" opacity="0.25"/>
          <!-- Tiny antenna/sprout on top -->
          <path d="M14 8 Q14 4 17 2" fill="none" stroke="#5BB8B0" stroke-width="0.6" opacity="0.2"/>
          <circle cx="17" cy="2" r="1.5" fill="#5BB8B0" opacity="0.12"/>
        </g>
      </svg>
    </div>
  </div>

  <!-- ── FOREST SPIRIT 2: Smaller, shyer — right side ── -->
  <div class="spirit forest-spirit" style="top:65%;right:12%;opacity:0.08;animation-delay:4s">
    <div class="spirit-tilt" style="animation-delay:1s;animation-duration:8s">
      <svg width="20" height="26" viewBox="0 0 20 26">
        <ellipse cx="10" cy="15" rx="8" ry="10" fill="#D4899F" opacity="0.12"/>
        <ellipse cx="10" cy="15" rx="8" ry="10" fill="none" stroke="#D4899F" stroke-width="0.4" opacity="0.18"/>
        <circle cx="7" cy="14" r="1" fill="#2A1D10" opacity="0.25"/>
        <circle cx="13" cy="14" r="1" fill="#2A1D10" opacity="0.25"/>
        <path d="M8 17 Q10 18.5 12 17" fill="none" stroke="#2A1D10" stroke-width="0.5" opacity="0.15"/>
        <circle cx="10" cy="10.5" r="0.6" fill="#D4899F" opacity="0.2"/>
        <!-- Two little leaf-ears -->
        <ellipse cx="4" cy="8" rx="3" ry="1.5" fill="#5BB8B0" opacity="0.1" transform="rotate(-30 4 8)"/>
        <ellipse cx="16" cy="8" rx="3" ry="1.5" fill="#5BB8B0" opacity="0.1" transform="rotate(30 16 8)"/>
      </svg>
    </div>
  </div>

  <!-- ── FOREST SPIRIT 3: Tiny, bottom left ── -->
  <div class="spirit forest-spirit" style="bottom:28%;left:18%;opacity:0.07;animation-delay:6s;animation-duration:5s">
    <svg width="14" height="18" viewBox="0 0 14 18">
      <ellipse cx="7" cy="11" rx="5.5" ry="7" fill="#5BB8B0" opacity="0.12"/>
      <circle cx="5" cy="10" r="0.8" fill="#2A1D10" opacity="0.2"/>
      <circle cx="9" cy="10" r="0.8" fill="#2A1D10" opacity="0.2"/>
      <path d="M5.5 13 Q7 14 8.5 13" fill="none" stroke="#2A1D10" stroke-width="0.4" opacity="0.15"/>
    </svg>
  </div>

  <!-- ── PEACOCK SPIRIT: Minimalist peacock fan, right side ── -->
  <div class="spirit" style="top:40%;right:6%;opacity:0.06;animation:floatReveal 2s ease-out 3s forwards">
    <div class="peacock-fan">
      <svg width="50" height="55" viewBox="0 0 50 55">
        <!-- Fan feathers (radiating arcs) -->
        <g fill="none" stroke="#5BB8B0" stroke-width="0.5" opacity="0.5">
          <path d="M25 45 Q10 25 15 10"/>
          <path d="M25 45 Q18 22 22 8"/>
          <path d="M25 45 Q25 18 25 5"/>
          <path d="M25 45 Q32 22 28 8"/>
          <path d="M25 45 Q40 25 35 10"/>
        </g>
        <!-- Eye-spots on feathers -->
        <circle cx="15" cy="12" r="2.5" fill="none" stroke="#E8A020" stroke-width="0.4" opacity="0.3"/>
        <circle cx="15" cy="12" r="1" fill="#E8A020" opacity="0.15"/>
        <circle cx="25" cy="7" r="2.5" fill="none" stroke="#E8A020" stroke-width="0.4" opacity="0.3"/>
        <circle cx="25" cy="7" r="1" fill="#E8A020" opacity="0.15"/>
        <circle cx="35" cy="12" r="2.5" fill="none" stroke="#E8A020" stroke-width="0.4" opacity="0.3"/>
        <circle cx="35" cy="12" r="1" fill="#E8A020" opacity="0.15"/>
        <!-- Tiny body -->
        <ellipse cx="25" cy="48" rx="4" ry="5" fill="#5BB8B0" opacity="0.1"/>
        <circle cx="23.5" cy="46" r="0.6" fill="#2A1D10" opacity="0.2"/>
        <circle cx="26.5" cy="46" r="0.6" fill="#2A1D10" opacity="0.2"/>
      </svg>
    </div>
  </div>

  <!-- ── ELEPHANT SPIRIT: Tiny kawaii elephant, bottom right ── -->
  <div class="spirit" style="bottom:18%;right:20%;opacity:0.06;animation:floatReveal 2s ease-out 5s forwards">
    <svg width="40" height="35" viewBox="0 0 40 35">
      <!-- Body -->
      <ellipse cx="20" cy="22" rx="14" ry="10" fill="#B8A898" opacity="0.12"/>
      <ellipse cx="20" cy="22" rx="14" ry="10" fill="none" stroke="#B8A898" stroke-width="0.5" opacity="0.15"/>
      <!-- Head -->
      <circle cx="20" cy="14" r="8" fill="#B8A898" opacity="0.1"/>
      <!-- Big ears -->
      <ellipse cx="10" cy="12" rx="6" ry="7" fill="#D4899F" opacity="0.06"/>
      <ellipse cx="30" cy="12" rx="6" ry="7" fill="#D4899F" opacity="0.06"/>
      <!-- Eyes -->
      <circle cx="17" cy="12.5" r="1" fill="#2A1D10" opacity="0.2"/>
      <circle cx="23" cy="12.5" r="1" fill="#2A1D10" opacity="0.2"/>
      <!-- Trunk (swaying) -->
      <g class="trunk-sway">
        <path d="M20 18 Q20 24 17 28 Q15 30 16 32" fill="none" stroke="#B8A898" stroke-width="1.2" stroke-linecap="round" opacity="0.15"/>
      </g>
      <!-- Tusks -->
      <path d="M16 18 Q14 22 15 23" fill="none" stroke="#E8A020" stroke-width="0.5" opacity="0.15"/>
      <path d="M24 18 Q26 22 25 23" fill="none" stroke="#E8A020" stroke-width="0.5" opacity="0.15"/>
    </svg>
  </div>

  <!-- ── LEOPARD SPIRIT: Small minimalist leopard, left side ── -->
  <div class="spirit leopard-breathe" style="top:48%;left:5%;opacity:0.06;animation:floatReveal 2s ease-out 4s forwards">
    <svg width="50" height="25" viewBox="0 0 50 25">
      <!-- Body -->
      <ellipse cx="25" cy="15" rx="18" ry="8" fill="#E8A020" opacity="0.08"/>
      <!-- Head -->
      <circle cx="8" cy="11" r="6" fill="#E8A020" opacity="0.07"/>
      <!-- Ears -->
      <polygon points="4,6 6,2 8,6" fill="#E8A020" opacity="0.06"/>
      <polygon points="8,6 10,2 12,6" fill="#E8A020" opacity="0.06"/>
      <!-- Eyes (cat-like) -->
      <ellipse cx="6" cy="10" rx="1.2" ry="0.7" fill="#2A1D10" opacity="0.2"/>
      <ellipse cx="10" cy="10" rx="1.2" ry="0.7" fill="#2A1D10" opacity="0.2"/>
      <!-- Spots -->
      <circle cx="20" cy="13" r="1.2" fill="#2A1D10" opacity="0.04"/>
      <circle cx="27" cy="11" r="1" fill="#2A1D10" opacity="0.04"/>

<!-- ═══ PARALLAX MOUSE TRACKING ═══ -->
<script>
  const layers = [
    { el: document.getElementById('layer1'), speed: 0.01 },
    { el: document.getElementById('layer2'), speed: 0.02 },
    { el: document.getElementById('layer3'), speed: 0.035 },
    { el: document.getElementById('spiritLayer'), speed: 0.015 },
  ];

  let targetX = 0, targetY = 0, currentX = 0, currentY = 0;

  document.addEventListener('mousemove', (e) => {
    targetX = (e.clientX - window.innerWidth / 2);
    targetY = (e.clientY - window.innerHeight / 2);
  });

  function animate() {
    currentX += (targetX - currentX) * 0.03;
    currentY += (targetY - currentY) * 0.03;
    layers.forEach(({ el, speed }) => {
      if (el) el.style.transform = `translate(${currentX * speed}px, ${currentY * speed}px)`;
    });
    requestAnimationFrame(animate);
  }
  animate();
</script>
