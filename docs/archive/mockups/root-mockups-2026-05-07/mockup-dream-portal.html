<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riz Razak</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FDF8F2;
    --text: #2A1D10;
    --text-soft: #6B5A48;
    --text-muted: #B8A898;
    --saffron: #E8A020;
    --lotus: #D4899F;
    --teal: #5BB8B0;
    --sand: #F0E4D4;
    --peach: #F8D8C8;
  }

  html, body {
    font-family: 'Quicksand', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ═══════════════════════════════════════════
     DREAMY BACKGROUND LAYERS
     ═══════════════════════════════════════════ */

  .dream-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  /* Soft radial glows — like warm light through silk */
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0;
    animation: glowIn 2s ease-out forwards;
  }
  .glow-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(232,160,32,0.08) 0%, transparent 70%);
    top: -10%; right: -5%;
    animation-delay: 0.3s;
  }
  .glow-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(212,137,159,0.06) 0%, transparent 70%);
    bottom: -5%; left: -5%;
    animation-delay: 0.6s;
  }
  .glow-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(91,184,176,0.05) 0%, transparent 70%);
    top: 40%; left: 50%;
    transform: translateX(-50%);
    animation-delay: 0.9s;
  }

  @keyframes glowIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  /* ═══════════════════════════════════════════
     FLOATING PARTICLES (subtle dust motes)
     ═══════════════════════════════════════════ */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: particleDrift linear infinite;
  }

  @keyframes particleDrift {
    0% { opacity: 0; transform: translateY(100vh) translateX(0); }
    10% { opacity: 0.4; }
    90% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-10vh) translateX(30px); }
  }

  /* ═══════════════════════════════════════════
     FLOATING SVG ELEMENTS (parallax layers)
     ═══════════════════════════════════════════ */
  .parallax-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    transition: transform 0.3s ease-out;
  }

  .float-element {
    position: absolute;
    opacity: 0;
    animation: floatReveal 1.5s ease-out forwards;
  }

  @keyframes floatReveal {
    from { opacity: 0; transform: translateY(20px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Individual float animations */
  .drift-1 { animation: drift1 8s ease-in-out infinite; }
  .drift-2 { animation: drift2 10s ease-in-out infinite; }
  .drift-3 { animation: drift3 12s ease-in-out infinite; }
  .drift-4 { animation: drift4 9s ease-in-out infinite; }
  .drift-5 { animation: drift5 11s ease-in-out infinite; }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(8px, -12px) rotate(2deg); }
    50% { transform: translate(-4px, -8px) rotate(-1deg); }
    75% { transform: translate(6px, -4px) rotate(1.5deg); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(-10px, -8px) rotate(-2deg); }
    66% { transform: translate(6px, -14px) rotate(1deg); }
  }
  @keyframes drift3 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(12px, -10px) rotate(3deg); }
  }
  @keyframes drift4 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    40% { transform: translate(-8px, -15px) rotate(-2.5deg); }
    80% { transform: translate(5px, -5px) rotate(1deg); }
  }
  @keyframes drift5 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    30% { transform: translate(6px, -10px) rotate(1.5deg); }
    70% { transform: translate(-10px, -6px) rotate(-2deg); }
  }

  /* ═══════════════════════════════════════════
     MAIN CONTENT
     ═══════════════════════════════════════════ */
  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  /* Gentle ornamental divider */
  .ornament-top {
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeIn 1s ease-out 0.5s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.25; }
  }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--saffron);
    opacity: 0;
    animation: fadeInUp 1s ease-out 0.7s forwards;
    margin-bottom: 1.2rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeInUp 1s ease-out 0.9s forwards;
    /* Warm gradient text */
    background: linear-gradient(135deg, var(--text) 30%, var(--saffron) 70%, var(--lotus) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .line {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--saffron), var(--lotus), transparent);
    border-radius: 1px;
    margin: 1rem auto 1.5rem;
    opacity: 0;
    animation: fadeInUp 1s ease-out 1s forwards;
  }

  .subtitle {
    font-size: 1rem;
    font-weight: 300;
    color: var(--text-soft);
    max-width: 360px;
    line-height: 1.8;
    margin-bottom: 2.8rem;
    opacity: 0;
    animation: fadeInUp 1s ease-out 1.1s forwards;
  }

  .cta-wrapper {
    opacity: 0;
    animation: fadeInUp 1s ease-out 1.3s forwards;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Quicksand', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-soft);
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 32px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(232,160,32,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 0 4px 20px rgba(232,160,32,0.06);
  }
  .cta:hover {
    background: rgba(255,255,255,0.85);
    border-color: rgba(232,160,32,0.3);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(232,160,32,0.12);
    color: var(--text);
  }
  .cta .arrow {
    display: inline-block;
    transition: transform 0.4s ease;
    font-size: 1.1rem;
  }
  .cta:hover .arrow {
    transform: translateX(5px);
  }

  .footer {
    margin-top: 4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-muted);
    opacity: 0;
    animation: fadeInUp 1s ease-out 1.5s forwards;
    letter-spacing: 0.5px;
  }

  /* ═══════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════ */
  @media (max-width: 600px) {
    .glow { filter: blur(60px); }
    .float-element svg { transform: scale(0.7); }
  }
</style>
</head>
<body>

<!-- ═══ DREAMY BACKGROUND ═══ -->
<div class="dream-bg">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>
</div>

<!-- ═══ FLOATING PARTICLES ═══ -->
<div class="particles">
  <div class="particle" style="left:12%;width:3px;height:3px;background:rgba(232,160,32,0.3);animation-duration:18s;animation-delay:0s"></div>
  <div class="particle" style="left:28%;width:2px;height:2px;background:rgba(212,137,159,0.3);animation-duration:22s;animation-delay:3s"></div>
  <div class="particle" style="left:55%;width:3px;height:3px;background:rgba(91,184,176,0.25);animation-duration:20s;animation-delay:6s"></div>
  <div class="particle" style="left:72%;width:2px;height:2px;background:rgba(232,160,32,0.25);animation-duration:24s;animation-delay:2s"></div>
  <div class="particle" style="left:88%;width:2.5px;height:2.5px;background:rgba(212,137,159,0.2);animation-duration:19s;animation-delay:8s"></div>
  <div class="particle" style="left:40%;width:2px;height:2px;background:rgba(91,184,176,0.2);animation-duration:25s;animation-delay:5s"></div>
  <div class="particle" style="left:65%;width:3px;height:3px;background:rgba(232,160,32,0.2);animation-duration:21s;animation-delay:10s"></div>
</div>

<!-- ═══ PARALLAX FLOATING ELEMENTS ═══ -->

<!-- Layer 1 — far (slowest drift) -->
<div class="parallax-layer" id="layer1">
  <!-- Lotus outline — top left -->
  <div class="float-element drift-1" style="top:10%;left:6%;animation-delay:0.8s">
    <svg width="55" height="55" viewBox="0 0 55 55" style="opacity:0.08">
      <g fill="none" stroke="#D4899F" stroke-width="0.8">
        <ellipse cx="27" cy="35" rx="9" ry="18" transform="rotate(-20 27 27)"/>
        <ellipse cx="27" cy="35" rx="9" ry="18" transform="rotate(20 27 27)"/>
        <ellipse cx="27" cy="35" rx="9" ry="18"/>
        <circle cx="27" cy="28" r="4" fill="#D4899F" opacity="0.15"/>
      </g>
    </svg>
  </div>

  <!-- Kolam dot cluster — bottom right -->
  <div class="float-element drift-3" style="bottom:18%;right:8%;animation-delay:1.2s">
    <svg width="60" height="60" viewBox="0 0 60 60" style="opacity:0.06">
      <g fill="#E8A020">
        <circle cx="10" cy="10" r="2"/><circle cx="30" cy="10" r="2"/><circle cx="50" cy="10" r="2"/>
        <circle cx="20" cy="25" r="2"/><circle cx="40" cy="25" r="2"/>
        <circle cx="10" cy="40" r="2"/><circle cx="30" cy="40" r="2"/><circle cx="50" cy="40" r="2"/>
        <circle cx="20" cy="55" r="2"/><circle cx="40" cy="55" r="2"/>
      </g>
    </svg>
  </div>
</div>

<!-- Layer 2 — mid -->
<div class="parallax-layer" id="layer2">
  <!-- Leaf silhouette — right side -->
  <div class="float-element drift-2" style="top:30%;right:5%;animation-delay:1s">
    <svg width="40" height="65" viewBox="0 0 40 65" style="opacity:0.06">
      <path d="M20 5 Q35 22 28 45 Q20 58 12 45 Q5 22 20 5Z" fill="none" stroke="#5BB8B0" stroke-width="0.8"/>
      <path d="M20 12 Q20 30 20 48" fill="none" stroke="#5BB8B0" stroke-width="0.5" opacity="0.5"/>
    </svg>
  </div>

  <!-- Tiny mandala — top right -->
  <div class="float-element drift-4" style="top:15%;right:22%;animation-delay:1.4s">
    <svg width="30" height="30" viewBox="0 0 30 30" style="opacity:0.07">
      <g fill="none" stroke="#E8A020" stroke-width="0.5">
        <circle cx="15" cy="15" r="12"/>
        <circle cx="15" cy="15" r="7"/>
        <circle cx="15" cy="15" r="2.5" fill="#E8A020" opacity="0.2"/>
        <line x1="15" y1="3" x2="15" y2="27"/>
        <line x1="3" y1="15" x2="27" y2="15"/>
      </g>
    </svg>
  </div>
</div>

<!-- Layer 3 — near (fastest drift) -->
<div class="parallax-layer" id="layer3">
  <!-- Wave curve — bottom -->
  <div class="float-element drift-5" style="bottom:8%;left:15%;animation-delay:1.6s">
    <svg width="120" height="25" viewBox="0 0 120 25" style="opacity:0.05">
      <path d="M0,15 Q30,0 60,15 Q90,30 120,15" fill="none" stroke="#5BB8B0" stroke-width="1"/>
    </svg>
  </div>

  <!-- Lotus petal — left center -->
  <div class="float-element drift-1" style="top:55%;left:4%;animation-delay:2s">
    <svg width="35" height="50" viewBox="0 0 35 50" style="opacity:0.06">
      <ellipse cx="17" cy="30" rx="8" ry="18" fill="none" stroke="#D4899F" stroke-width="0.7" transform="rotate(-10 17 25)"/>
    </svg>
  </div>
</div>

<!-- ═══ MAIN CONTENT ═══ -->
<div class="container">

  <!-- Small ornamental lotus -->
  <div class="ornament-top">
    <svg width="32" height="24" viewBox="0 0 32 24" style="opacity:0.2">
      <g fill="none" stroke="#E8A020" stroke-width="0.7">
        <ellipse cx="16" cy="16" rx="5" ry="12" transform="rotate(-15 16 14)"/>
        <ellipse cx="16" cy="16" rx="5" ry="12" transform="rotate(15 16 14)"/>
        <ellipse cx="16" cy="16" rx="5" ry="12"/>
        <circle cx="16" cy="12" r="2.5" fill="#E8A020" opacity="0.15"/>
      </g>
    </svg>
  </div>

  <p class="tag">Coming Soon</p>

  <h1>Riz Razak</h1>

  <div class="line"></div>

  <p class="subtitle">Something interesting is brewing.</p>

  <div class="cta-wrapper">
    <a href="https://analyst.rizrazak.com/" class="cta">
      For now, enjoy the deep analysis <span class="arrow">&rarr;</span>
    </a>
  </div>

  <p class="footer">&copy; 2026 Riz Razak</p>
</div>

<!-- ═══ PARALLAX MOUSE TRACKING ═══ -->
<script>
  // Subtle parallax on mouse move
  const layers = [
    { el: document.getElementById('layer1'), speed: 0.01 },
    { el: document.getElementById('layer2'), speed: 0.02 },
    { el: document.getElementById('layer3'), speed: 0.035 },
  ];

  let targetX = 0, targetY = 0, currentX = 0, currentY = 0;

  document.addEventListener('mousemove', (e) => {
    targetX = (e.clientX - window.innerWidth / 2);
    targetY = (e.clientY - window.innerHeight / 2);
  });

  function animate() {
    currentX += (targetX - currentX) * 0.03;
    currentY += (targetY - currentY) * 0.03;

    layers.forEach(({ el, speed }) => {
      if (el) {
        el.style.transform = `translate(${currentX * speed}px, ${currentY * speed}px)`;
      }
    });
    requestAnimationFrame(animate);
  }
  animate();

  // Gentle scroll parallax for mobile
  let lastScroll = 0;
  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    layers.forEach(({ el, speed }) => {
      if (el) {
        el.style.transform = `translateY(${scrollY * speed * -0.5}px)`;
      }
    });
  }, { passive: true });
</script>

</body>
</html>
