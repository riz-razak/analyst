name = "analyst-collaborative-cms"
type = "service"
main = "functions/_middleware.js"
compatibility_date = "2025-03-09"

# Daily cron: anonymise IPs older than 180 days (3am UTC)
[triggers]
crons = ["0 3 * * *"]

[env.production]
routes = [
  { pattern = "analyst.rizrazak.com/*", zone_name = "rizrazak.com" }
]
kv_namespaces = [
  { binding = "SESSION_STORE", id = "edcba0db08ef42e9847b1a9c876eb5de", preview_id = "edcba0db08ef42e9847b1a9c876eb5de" },
  { binding = "DRAFT_STORE", id = "11fe938b97104d39800a2aa3afe8d699", preview_id = "11fe938b97104d39800a2aa3afe8d699" }
]

[build]
cwd = "."
command = "npm run build"
watch_paths = ["src/**/*.jsx", "src/**/*.js"]

[build.upload]
main = "dist/index.js"
rules = [
  { type = "Text", globs = ["**/*.js", "**/*.json"] }
]

[env.production.vars]
GITHUB_REPO = "riz-razak/analyst"
GITHUB_BRANCH = "main"
ENVIRONMENT = "production"
# NOTE: Email sending requires a Cloudflare secret (not stored in wrangler.toml):
#   wrangler secret put RESEND_API_KEY --env production
# Get your free API key at https://resend.com (3,000 emails/month free)
# Also verify submissions@analyst.rizrazak.com in Resend dashboard
#
# NOTE: CMS publish-to-GitHub requires a fine-grained GitHub PAT:
#   wrangler secret put GITHUB_TOKEN --env production
# Create at https://github.com/settings/tokens (fine-grained)
# Scopes needed: Contents (read & write) on riz-razak/analyst

[env.development.vars]
GITHUB_REPO = "riz-razak/analyst"
GITHUB_BRANCH = "develop"
ENVIRONMENT = "development"
