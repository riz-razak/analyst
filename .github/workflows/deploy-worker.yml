name: Deploy Collaborative CMS Worker

on:
  push:
    branches: [main]
    paths:
      - 'functions/collaborative-session.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker & KV Namespaces
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create KV namespaces and deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          #!/bin/bash
          set -e
          
          echo "Installing wrangler..."
          npm install -g wrangler
          
          echo "Creating SESSION_STORE KV namespace..."
          wrangler kv namespace create "analyst-session-kv" || echo "Namespace may already exist"
          
          echo "Creating DRAFT_STORE KV namespace..."
          wrangler kv namespace create "analyst-draft-kv" || echo "Namespace may already exist"
          
          echo "Deploying Worker..."
          wrangler deploy \
            --name analyst-collaborative-cms \
            --compatibility-date 2025-03-09 \
            functions/collaborative-session.js

      - name: Verify deployment
        run: |
          echo "Worker deployed to: https://analyst-collaborative-cms.riz-1cb.workers.dev/"
          sleep 2
          curl -s "https://analyst-collaborative-cms.riz-1cb.workers.dev/api/session/status?articleId=test" | head -c 200 || echo "Testing endpoint"
