name: Deploy Collaborative CMS Worker

on:
  push:
    branches: [main]
    paths:
      - 'functions/collaborative-session.js'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy base Worker with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env=""

      - name: Verify public auth smoke checks
        run: |-
          node - <<'NODE'
          const base = 'https://analyst.rizrazak.com';
          const checks = [
            ['/auth/signed-out', 200],
            ['/auth/login?next=%2Fadmin-preview.html', 302],
            ['/auth/unified/start?next=%2Fadmin-preview.html', 302],
            ['/profile.html', 302],
          ];
          for (const [path, expected] of checks) {
            const response = await fetch(`${base}${path}`, { redirect: 'manual' });
            if (response.status !== expected) {
              throw new Error(`${path} returned ${response.status}, expected ${expected}`);
            }
          }
          NODE
