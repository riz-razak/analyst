name: Deploy Collaborative CMS Worker

on:
  push:
    branches: [main]
    paths:
      - 'functions/collaborative-session.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker & KV Namespaces
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create KV namespaces and deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          #!/bin/bash
          set -e

          ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}"
          AUTH_TOKEN="${CLOUDFLARE_API_TOKEN}"
          WORKER_NAME="analyst-collaborative-cms"

          # Function to create KV namespace
          create_kv_namespace() {
            local namespace_name=$1
            echo "Creating KV namespace: $namespace_name"

            response=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/storage/kv/namespaces" \
              -H "Authorization: Bearer ${AUTH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"title\": \"$namespace_name\"}")

            # Check if namespace already exists or was created
            if echo "$response" | grep -q '"success":true'; then
              namespace_id=$(echo "$response" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "✓ Namespace created/exists: $namespace_name (ID: $namespace_id)"
            else
              echo "Response: $response"
              echo "Note: Namespace may already exist, continuing..."
            fi
          }

          # Create namespaces
          create_kv_namespace "analyst-session-kv"
          create_kv_namespace "analyst-draft-kv"

          # Deploy Worker
          echo "Deploying Worker: $WORKER_NAME"

          # Read the worker script
          WORKER_SCRIPT=$(cat functions/collaborative-session.js)

          # Deploy to Cloudflare Workers
          deploy_response=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -H "Content-Type: application/javascript" \
            --data-binary "@functions/collaborative-session.js")

          if echo "$deploy_response" | grep -q '"success":true'; then
            echo "✓ Worker deployed successfully: $WORKER_NAME"
          else
            echo "Deployment response: $deploy_response"
            exit 1
          fi

      - name: Verify deployment
        run: |
          echo "Worker deployed to: https://analyst-collaborative-cms.riz-1cb.workers.dev/"
          sleep 2
          curl -s "https://analyst-collaborative-cms.riz-1cb.workers.dev/api/session/status?articleId=test" | head -c 200 || echo "Testing endpoint"
