name: Deploy Collaborative CMS Worker

on:
  push:
    branches: [main]
    paths:
      - 'functions/collaborative-session.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker & KV Namespaces
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create KV namespaces and deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |-
          #!/bin/bash
          set -e

          ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}"
          AUTH_TOKEN="${CLOUDFLARE_API_TOKEN}"
          WORKER_NAME="analyst-collaborative-cms"

          # Function to create or get KV namespace
          create_kv_namespace() {
            local namespace_name=$1
            echo "Creating KV namespace: $namespace_name" >&2

            response=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/storage/kv/namespaces" \
              -H "Authorization: Bearer ${AUTH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"title\": \"$namespace_name\"}")

            # Check if namespace was created or already exists
            if echo "$response" | grep -q '"success":true'; then
              namespace_id=$(echo "$response" | python3 -c "import sys, json; print(json.load(sys.stdin)['result']['id'])" 2>/dev/null)
              if [ ! -z "$namespace_id" ]; then
                echo "✓ Namespace created: $namespace_name (ID: $namespace_id)" >&2
                echo "$namespace_id"
                return 0
              fi
            fi

            # Try to list existing namespaces and find the one we want
            echo "Namespace doesn't exist yet, checking existing namespaces..." >&2
            list_response=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/storage/kv/namespaces" \
              -H "Authorization: Bearer ${AUTH_TOKEN}")

            namespace_id=$(echo "$list_response" | python3 -c "import sys, json; result = json.load(sys.stdin); namespaces = result.get('result', []); matching = [ns['id'] for ns in namespaces if ns['title'] == '$namespace_name']; print(matching[0] if matching else '')" 2>/dev/null)

            if [ ! -z "$namespace_id" ]; then
              echo "✓ Found existing namespace: $namespace_name (ID: $namespace_id)" >&2
              echo "$namespace_id"
              return 0
            else
              echo "✗ Could not create or find namespace: $namespace_name" >&2
              echo "API Response: $response" >&2
              exit 1
            fi
          }

          # Create namespaces and capture IDs
          echo "Creating or retrieving KV namespaces..."
          SESSION_KV_ID=$(create_kv_namespace "analyst-session-kv")
          DRAFT_KV_ID=$(create_kv_namespace "analyst-draft-kv")
          echo "Successfully obtained namespace IDs"
          echo "SESSION_STORE ID: $SESSION_KV_ID"
          echo "DRAFT_STORE ID: $DRAFT_KV_ID"

          # Deploy Worker
          echo "Deploying Worker: $WORKER_NAME"
          echo "Using KV namespaces: SESSION_STORE=$SESSION_KV_ID, DRAFT_STORE=$DRAFT_KV_ID"

          # Build metadata JSON inline — part name "worker.js" must match main_module
          echo "Creating metadata JSON..." >&2
          printf '{"main_module":"worker.js","bindings":[{"type":"kv_namespace","name":"SESSION_STORE","namespace_id":"%s"},{"type":"kv_namespace","name":"DRAFT_STORE","namespace_id":"%s"}]}' \
            "$SESSION_KV_ID" "$DRAFT_KV_ID" > /tmp/metadata.json
          echo "Metadata: $(cat /tmp/metadata.json)" >&2
          echo "Metadata JSON created successfully" >&2

          # Deploy to Cloudflare Workers with multipart form
          # Write curl output to file to avoid set -e killing the script on non-zero exit code
          echo "Sending deployment request..." >&2
          curl_exit=0
          curl -s -o /tmp/deploy_body.txt -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -F "metadata=@/tmp/metadata.json;type=application/json" \
            -F "worker.js=@functions/collaborative-session.js;filename=worker.js;type=application/javascript+module" \
            > /tmp/deploy_http_code.txt 2>/tmp/curl_stderr.txt || curl_exit=$?

          http_code=$(cat /tmp/deploy_http_code.txt 2>/dev/null || echo "unknown")
          body=$(cat /tmp/deploy_body.txt 2>/dev/null || echo "")
          curl_err=$(cat /tmp/curl_stderr.txt 2>/dev/null || echo "")

          echo "Curl exit code: $curl_exit" >&2
          echo "HTTP Code: $http_code" >&2
          echo "Deploy response: $body" >&2
          [ -n "$curl_err" ] && echo "Curl stderr: $curl_err" >&2

          if echo "$body" | grep -q '"success":true'; then
            echo "✓ Worker deployed successfully: $WORKER_NAME"
            echo "Worker URL: https://${WORKER_NAME}.riz-1cb.workers.dev"
          else
            echo "Deployment failed. Curl exit: $curl_exit, HTTP: $http_code"
            echo "Response: $body"
            exit 1
          fi

      - name: Verify deployment
        run: |
          echo "Worker deployed to: https://analyst-collaborative-cms.riz-1cb.workers.dev/"
          sleep 2
          curl -s "https://analyst-collaborative-cms.riz-1cb.workers.dev/api/session/status?articleId=test" | head -c 200 || echo "Testing endpoint"
